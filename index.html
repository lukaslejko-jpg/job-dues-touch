er-radius:8px;background:linear-gradient(150deg,rgba(23,34,49,.92),rgba(8,13,20,.96));padding:14px}.card{text-align:left;min-height:148px}.card b{display:grid;place-items:center;width:56px;height:56px;border:1px solid rgba(221,191,130,.35);border-radius:8px;background:rgba(221,191,130,.16);color:#f4d89d;font-size:26px;margin-bottom:8px}.field{width:100%;border:1px solid rgba(255,255,255,.13);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;padding:10px;outline:none}.list{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);padding:12px}.pill{min-height:34px;border:0;border-radius:8px;background:rgba(255,255,255,.08);color:#cbd5e1;font-weight:800}.pill.active{background:var(--gold);color:#111}.metric strong{display:block;font-size:30px;margin-top:6px}.board-page main{padding:0;overflow:hidden}.board-layout{height:calc(100dvh - 104px);display:grid;gap:8px;overflow:hidden}.side{grid-template-columns:var(--pw) minmax(0,1fr)}.side>.tools{grid-column:1;grid-row:1}.side>.canvas-wrap{grid-column:2;grid-row:1}.bottom{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) var(--ph)}.bottom>.canvas-wrap{grid-column:1;grid-row:1}.bottom>.tools{grid-column:1;grid-row:2}.tools{display:flex;flex-direction:column;overflow:hidden;width:var(--pw);height:100%;padding:7px}.bottom .tools{width:100%;height:var(--ph)}.tools-scroll{overflow:auto;display:grid;gap:8px}.bottom .tools-scroll{display:flex;overflow-x:auto;overflow-y:hidden}.collapsed .tools-scroll{display:none}.collapsed.side{grid-template-columns:var(--pw) minmax(0,1fr)}.collapsed.bottom{grid-template-rows:minmax(0,1fr) var(--ph)}.collapsed .tools{padding:6px;overflow:hidden}.collapsed .iconbar{display:grid}.iconbar{display:none;grid-template-columns:repeat(var(--cols),minmax(0,var(--icon)));grid-auto-rows:var(--icon);justify-content:center;align-content:start;gap:var(--gap);height:100%;overflow:auto}.bottom .iconbar{grid-auto-flow:column;grid-template-rows:repeat(var(--rows),var(--icon));grid-template-columns:none;grid-auto-columns:var(--icon);justify-content:start;align-content:center}.icon{width:var(--icon);min-width:0;height:var(--icon);min-height:var(--icon);padding:0;font-size:calc(var(--icon)*.43);display:grid;place-items:center}.win{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.045);min-width:0}.bottom .win{min-width:230px}.win summary{list-style:none;display:flex;justify-content:space-between;gap:8px;min-height:34px;padding:8px;color:#f4d89d;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:950;cursor:pointer}.win summary:after{content:'-'}.win:not([open]) summary:after{content:'+'}.win-body{padding:0 8px 8px;display:grid;gap:8px}.mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:6px}.mini.two{grid-template-columns:repeat(2,1fr)}.tools .action{min-height:34px;font-size:12px;padding:6px 7px}.range{display:grid;gap:5px;color:#cbd5e1;font-size:12px}.range input{width:100%}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.swatch{min-height:30px;border-radius:8px;border:2px solid rgba(255,255,255,.18)}.swatch.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(221,191,130,.25)}.canvas-wrap{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#fff;min-height:0}.canvas-wrap.gridbg{background-image:linear-gradient(rgba(221,191,130,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(221,191,130,.18) 1px,transparent 1px);background-size:40px 40px}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:20}.selecting canvas{pointer-events:none}.obj{position:absolute;z-index:10;border:3px solid transparent;border-radius:8px;touch-action:none;cursor:move;resize:both;overflow:auto}.obj.img{object-fit:contain;background:#fff;display:block}.obj.msg{display:grid;place-items:center;padding:12px;background:#111827;color:#f8fafc;text-align:center;font-weight:850 <body><div id="app"></div><script>
const $=s=>document.querySelector(s),qs=s=>[...document.querySelectorAll(s)],store=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}},uid=()=>Date.now()+Math.random().toString(16).slice(2);
let state=load('jd-state',{view:'home',tool:'pen',color:'#2b2b2d',size:8,bg:'#fff',panel:'side',collapsed:false,grid:false,panelW:300,panelH:230,iconRows:1});
let objects=load('jd-board-objects',[]),boardData=load('jd-board-canvas',''),selected=null,undoStack=[],items={ann:load('ann',[{t:'Týždenná porada',b:'Pondelok 09:00 v zasadacej miestnosti.'}]),tasks:load('tasks',[{t:'Pripraviť mesačné výkazy',s:'rieši sa'}]),clients:load('clients',[{n:'NOVA s.r.o.',m:'Bankové výpisy, prijaté faktúry',p:'Čakáme na podklady za máj.'},{n:'ALFA Trade',m:'Zmluva o spolupráci',p:'Prioritný klient.'}]),chat:load('chat',[{r:'ai',t:'Dobrý deň, som AI asistent JOB & DUES. Obrázky vytvoríte v digitálnej tabuli v okne AI obrázok.'}])};
const modules=[['home','⌂','Domov','Domov'],['board','✎','Tabuľa','Digitálna tabuľa'],['ann','!','Oznamy','Oznamy'],['tasks','✓','Úlohy','Úlohy'],['clients','▦','Klienti','Klienti'],['docs','□','Dok','Dokumenty'],['ai','AI','AI','AI asistent'],['analytics','▥','Dáta','Analýzy']],tools=[['pen','✎','Pero'],['eraser','⌫','Guma'],['undo','↶','Späť'],['redo','↷','Znova'],['high','▰','Zvýrazňovač'],['line','╱','Čiara'],['arrow','➜','Šípka'],['circle','○','Kruh'],['rect','□','Obdĺžnik'],['select','↕','Presun'],['clear','×','Vymazať kresbu']],bgColors=['#ffffff','#f8fafc','#fef3c7','#ddbf82','#c9a768','#0f172a','#111827','#e0f2fe','#dcfce7','#fee2e2'];
function clamp(n,a,b){return Math.max(a,Math.min(b,Number(n)||a))}function persist(){store('jd-state',state);store('jd-board-objects',objects);store('jd-board-canvas',boardData)}function capture(){let c=$('#cv');if(c&&c.width)boardData=c.toDataURL();persist()}function pushUndo(){let c=$('#cv');if(c&&c.width){undoStack.push(c.toDataURL());if(undoStack.length>20)undoStack.shift()}}function go(v){capture();state.view=v;render()}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function setBg(v){if(!/^#[0-9a-fA-F]{6}$/.test(v))return;state.bg=v;let w=$('#wrap');if(w)w.style.backgroundColor=v;let hx=$('#bgHex');if(hx&&hx.value!==v)hx.value=v;persist()}function logo(){return ''}
function shell(content,bodyClass=''){persist();document.body.className=bodyClass;$('#app').innerHTML=`<header class="top"><button class="brand" onclick="go('home')">${logo()}<span><strong>JOB & DUES</strong><span>firemný dotykový panel</span></span></button><nav class="nav">${modules.map(m=>`<button class="${state.view==m[0]?'active':''}" onclick="go('${m[0]}')">${m[1]} ${m[2]}</button>`).join('')}</nav></header><main>${content}</main>`}
function home(){shell(`<section class="hero"><div>JOB & DUES</div><h1>Dotykový firemný panel</h1><p>Digitálna tabuľa, oznamy, úlohy, klienti, dokumenty, AI a analýzy.</p></section><section class="grid home">${modules.filter(m=>m[0]!='home').map(m=>`<button class="card" onclick="go('${m[0]}')"><b>${m[1]}</b><h2>${m[3]}</h2><p>Otvoriť modul</p></button>`).join('')}</section>`)}function win(t,b,open=true){return `<details class="win" ${open?'open':''}><summary>${t}</summary><div class="win-body">${b}</div></details>`}
function panelMetrics(){let minW=state.collapsed?(state.iconRows==2?92:54):190;state.panelW=clamp(state.panelW,minW,560);state.panelH=clamp(state.panelH,state.collapsed?58:120,640);let cols=state.panel==='side'?(state.iconRows==2?2:1):Math.max(1,Math.ceil((tools.length+12)/(state.iconRows==2?2:1)));let rows=state.panel==='bottom'?(state.iconRows==2?2:1):1;let icon=state.panel==='side'?Math.floor((state.panelW-18-((cols-1)*6))/cols):Math.floor((state.panelH-18-((rows-1)*6))/rows);icon=clamp(icon,24,40);return{cols,rows,icon,gap:icon<=30?4:6}}
function iconbar(){let m=panelMetrics();return `<div class="iconbar" style="--cols:${m.cols};--rows:${m.rows};--icon:${m.icon}px;--gap:${m.gap}px"><button class="action icon" title="Rozbaliť panel" onclick="state.collapsed=false;persist();board()">☰</button>${tools.map(x=>`<button class="action icon ${state.tool==x[0]?'active':''}" title="${x[2]}" onclick="setTool('${x[0]}')">${x[1]}</button>`).join('')}<button class="action icon ${state.iconRows==2?'active':''}" title="1 alebo 2 rady" onclick="state.iconRows=state.iconRows==2?1:2;persist();board()">${state.iconRows==2?'1R':'2R'}</button><button class="action icon" title="AI obrázok" onclick="createAiImage()">AI</button><button class="action icon" title="Text" onclick="addText('text')">T</button><button class="action icon" title="Sticky" onclick="addText('note')">N</button><button class="action icon" title="Import" onclick="fileIn.click()">⇪</button><button class="action icon" title="Vymazať označený objekt" onclick="deleteSelected()">⌦</button><button class="action icon" title="Uložiť" onclick="saveProject()">S</button><button class="action icon" title="Export" onclick="downloadBoard()">⇩</button><button class="action icon" title="Panel" onclick="togglePanel()">${state.panel=='side'?'⇩':'⇨'}</button></div>`}
function board(){panelMetrics();let cls=`board-layout ${state.panel} ${state.collapsed?'collapsed':''}`;shell(`<section id="layout" class="${cls}" style="--pw:${state.panelW}px;--ph:${state.panelH}px"><aside class="panel tools"><input id="fileIn" type="file" accept="image/*" multiple hidden onchange="importImages(this.files)"><input id="projIn" type="file" accept="application/json,.json" hidden onchange="loadProject(this.files[0])">${iconbar()}<div class="tools-scroll">${win('Panel',`<div class="mini"><button class="action" onclick="state.collapsed=!state.collapsed;persist();board()">☰</button><button class="action" onclick="togglePanel()">${state.panel=='side'?'Dole ⇩':'Bok ⇨'}</button><button class="action" onclick="state.grid=!state.grid;persist();board()">Mriežka</button></div><div class="mini two"><button class="action ${state.iconRows==2?'active':''}" onclick="state.iconRows=state.iconRows==2?1:2;persist();board()">Ikony ${state.iconRows==2?'1 rad':'2 rady'}</button><button class="action" onclick="clearBoard()">Vymazať</button></div><label class="range">Šírka panelu: <b>${state.panelW}px</b><input type="range" min="${state.collapsed?(state.iconRows==2?92:54):190}" max="560" step="10" value="${state.panelW}" oninput="state.panelW=+this.value;applyPanel();board()"></label><label class="range">Výška panelu: <b>${state.panelH}px</b><input type="range" min="${state.collapsed?58:120}" max="640" step="10" value="${state.panelH}" oninput="state.panelH=+this.value;applyPanel();board()"></label>`)}${win('Nástroje',`<div class="mini">${tools.map(x=>`<button class="action ${state.tool==x[0]?'active':''}" onclick="setTool('${x[0]}')">${x[1]} ${x[2]}</button>`).join('')}</div>`)}${win('Farba pera',`<div class="swatches">${['#2b2b2d','#0d0d0d','#ddbf82','#c9a768','#fff','#ef4444','#22c55e','#3b82f6','#f59e0b','#a855f7'].map(c=>`<button class="swatch ${state.color==c?'active':''}" style="background:${c}" onclick="state.color='${c}';state.tool='pen';persist();board()"></button>`).join('')}</div><input class="field" type="color" value="${state.color}" onchange="state.color=this.value;persist()">`)}${win('Čiara / pozadie',`<label class="range">Hrúbka ${state.size}<input type="range" min="2" max="40" value="${state.size}" oninput="state.size=this.value;persist()"></label><div class="swatches">${bgColors.map(c=>`<button class="swatch ${state.bg==c?'active':''}" style="background:${c}" onclick="setBg('${c}')"></button>`).join('')}</div><input id="bgHex" class="field" value="${state.bg}" placeholder="#ffffff" oninput="setBg(this.value)"><input class="field" type="color" value="${state.bg}" onchange="setBg(this.value)">`)}${win('AI obrázok',`<textarea id="imgPrompt" class="field" rows="3" placeholder="Napr. moderná kancelária JOB & DUES"></textarea><div class="mini two"><button class="action" onclick="createAiImage('demo')">Demo obrázok</button><button class="action" onclick="createAiImage('openai')">OpenAI obrázok</button></div><input id="openaiKey" class="field" type="password" value="${esc(load('jd-openai-key',''))}" placeholder="OpenAI / ChatGPT API kľúč - uložiť raz"><button class="action" onclick="saveOpenAiKey()">Uložiť OpenAI kľúč</button><div class="list">Kľúč sa nedá bezpečne skryť v HTML kóde. Tu sa uloží iba v tomto zariadení; bezpečné riešenie je Vercel server funkcia.</div>`,false)}${win('Text / sticky',`<textarea id="txt" class="field" rows="3" placeholder="Text alebo poznámka"></textarea><div class="mini two"><button class="action" onclick="addText('text')">Text</button><button class="action" onclick="addText('note')">Sticky</button></div>`,false)}${win('Import / projekt',`<button class="action" onclick="fileIn.click()">Import obrázkov</button><button class="action" onclick="deleteSelected()">Vymazať označený objekt</button><button class="action" onclick="saveProject()">Uložiť projekt</button><button class="action" onclick="projIn.click()">Načítať projekt</button>`,false)}${win('Export',`<div class="mini two"><button class="action" onclick="downloadBoard()">Obrázok</button><button class="action" onclick="clearBoard()">Vymazať</button></div>`,false)}</div></aside><div id="wrap" class="canvas-wrap ${state.grid?'gridbg':''} ${state.tool=='select'?'selecting':''}" style="background-color:${state.bg}">${objects.map(renderObj).join('')}<canvas id="cv"></canvas></div></section>`,'board-page');applyPanel();setupCanvas();setupObjects()}
function applyPanel(){let l=$('#layout');if(l){l.style.setProperty('--pw',state.panelW+'px');l.style.setProperty('--ph',state.panelH+'px')}persist()}function togglePanel(){state.panel=state.panel==='side'?'bottom':'side';state.collapsed=true;if(state.panel==='bottom'&&state.panelH<90)state.panelH=120;if(state.panel==='side'&&state.panelW<(state.iconRows==2?92:54))state.panelW=state.iconRows==2?92:54;persist();board()}function saveOpenAiKey(){let k=$('#openaiKey');store('jd-openai-key',String(k?.value||'').trim());alert('OpenAI kľúč je uložený v tomto zariadení.')}function deleteSelected(){if(!selected)return alert('Najprv zvoľte nástroj Presun a označte obrázok, text alebo poznámku.');objects=objects.filter(o=>o.id!==selected);selected=null;persist();board()}
function renderObj(o){if(o.kind=='note'||o.kind=='text')return `<div contenteditable class="obj ${o.kind} ${selected==o.id?'activeObj':''}" data-id="${o.id}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;min-height:${o.h}px">${esc(o.text)}</div>`;if(o.error||o.loading)return `<div class="obj msg ${selected==o.id?'activeObj':''}" data-id="${o.id}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px">${esc(o.error||'Načítavam obrázok...')}</div>`;return `<img class="obj img ${selected==o.id?'activeObj':''}" data-id="${o.id}" src="${o.src}" alt="Obrázok na tabuli" referrerpolicy="no-referrer" crossorigin="anonymous" onload="markImageOk('${o.id}')" onerror="markImageError('${o.id}')" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px">`}function setTool(t){capture();if(t=='undo')return undoBoard();if(t=='redo')return;if(t=='clear')return clearCanvasOnly();state.tool=t;persist();board()}function clearCanvasOnly(){pushUndo();let c=$('#cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);boardData='';persist()}function undoBoard(){let c=$('#cv');if(!c||!undoStack.length)return;let prev=undoStack.pop(),x=c.getContext('2d'),img=new Image();img.onload=()=>{x.clearRect(0,0,c.width,c.height);x.drawImage(img,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);boardData=prev;persist()};img.src=prev}function clearBoard(){if(confirm('Vymazať celú tabuľu?')){pushUndo();objects=[];boardData='';persist();board()}}function markImageOk(id){let o=objects.find(x=>x.id==id);if(o&&o.loading){delete o.loading;persist()}}function markImageError(id){let o=objects.find(x=>x.id==id);if(o){o.error='Obrázok sa nenačítal. Skúste ho vytvoriť znova alebo použiť kratší prompt.';persist();board()}}function addText(kind){capture();let text=($('#txt')?.value||'Poznámka').trim();objects.push({id:uid(),kind,type:kind,text,x:70,y:70,w:230,h:90});selected=objects.at(-1).id;persist();state.tool='select';board()}
function loadImage(src){return new Promise((res,rej)=>{let img=new Image();img.crossOrigin='anonymous';img.onload=()=>res(img);img.onerror=()=>rej(Error('Obrázok sa nepodarilo načítať.'));img.src=src})}async function stableImageSrc(src){try{let img=await loadImage(src),max=1200,scale=Math.min(1,max/Math.max(img.naturalWidth||img.width,img.naturalHeight||img.height)),c=document.createElement('canvas');c.width=Math.max(1,Math.round((img.naturalWidth||img.width)*scale));c.height=Math.max(1,Math.round((img.naturalHeight||img.height)*scale));c.getContext('2d').drawImage(img,0,0,c.width,c.height);return c.toDataURL('image/jpeg',.9)}catch{return src}}async function createAiImage(mode='demo'){capture();let prompt=($('#imgPrompt')?.value||'JOB & DUES modern corporate image').trim(),src='',id=uid();objects.push({id,type:'ai-image',loading:true,x:70,y:70,w:320,h:220});selected=id;state.tool='select';persist();board();try{if(mode==='openai'){let input=String($('#openaiKey')?.value||'').trim();if(input)store('jd-openai-key',input);let key=input||String(load('jd-openai-key','')).trim();if(!key)throw Error('Najprv vložte OpenAI API kľúč raz do poľa alebo použite Demo obrázok.');let r=await fetch('https://api.openai.com/v1/images/generations',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-image-1',prompt,size:'1024x1024'})});let d=await r.json();if(!r.ok)throw Error(d?.error?.message||'OpenAI obrázok sa nepodarilo vytvoriť.');src=d.data?.[0]?.b64_json?'data:image/png;base64,'+d.data[0].b64_json:d.data?.[0]?.url}else src='https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt+' clean corporate dark gold')+'?width=900&height=600&nologo=true&seed='+Date.now();if(!src)throw Error('AI nevrátila obrázok.');let o=objects.find(x=>x.id==id);if(!o)return;o.src=await stableImageSrc(src);delete o.loading;delete o.error;persist();board()}catch(e){let o=objects.find(x=>x.id==id);if(o){delete o.loading;o.error=e.message||'Obrázok sa nepodarilo vytvoriť.';persist();board()}else alert(e.message||e)}}function importImages(files){capture();[...files].forEach(f=>{let r=new FileReader();r.onload=()=>{objects.push({id:uid(),type:'image',src:r.result,x:70,y:70,w:300,h:210});persist();state.tool='select';board()};r.readAsDataURL(f)})}function drawArrow(ctx,a,b){let ang=Math.atan2(b.y-a.y,b.x-a.x),h=Math.max(14,state.size*2.4);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-h*Math.cos(ang-Math.PI/6),b.y-h*Math.sin(ang-Math.PI/6));ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-h*Math.cos(ang+Math.PI/6),b.y-h*Math.sin(ang+Math.PI/6))}
function setupCanvas(){let c=$('#cv'),w=$('#wrap');if(!c||!w)return;let ctx=c.getContext('2d'),drawing=false,last=null,snap=null;function resize(){let r=w.getBoundingClientRect(),old=boardData;c.width=Math.max(1,Math.floor(r.width*devicePixelRatio));c.height=Math.max(1,Math.floor(r.height*devicePixelRatio));ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(old){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old}}new ResizeObserver(resize).observe(w);setTimeout(resize,60);function p(e){let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){if(state.tool=='select')return;e.preventDefault();pushUndo();drawing=true;last=p(e);snap=ctx.getImageData(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round'}function move(e){if(!drawing)return;e.preventDefault();let q=p(e);ctx.strokeStyle=state.tool=='eraser'?state.bg:state.tool=='high'?'rgba(221,191,130,.35)':state.color;ctx.lineWidth=state.tool=='high'?state.size*2:state.size;if(['line','rect','arrow','circle'].includes(state.tool)){ctx.putImageData(snap,0,0);ctx.beginPath();if(state.tool=='line'){ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y)}else if(state.tool=='arrow')drawArrow(ctx,last,q);else if(state.tool=='circle')ctx.ellipse((last.x+q.x)/2,(last.y+q.y)/2,Math.abs(q.x-last.x)/2,Math.abs(q.y-last.y)/2,0,0,Math.PI*2);else ctx.rect(last.x,last.y,q.x-last.x,q.y-last.y);ctx.stroke();return}ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q}function stop(){if(drawing){drawing=false;capture()}}['mousedown','touchstart'].forEach(e=>c.addEventListener(e,start,{passive:false}));['mousemove','touchmove'].forEach(e=>c.addEventListener(e,move,{passive:false}));['mouseup','mouseleave','touchend','touchcancel'].forEach(e=>c.addEventListener(e,stop,{passive:false}))}
function setupObjects(){qs('.obj').forEach(el=>{let id=el.dataset.id,o=objects.find(x=>x.id==id),drag=null;el.oninput=()=>{if(o.kind){o.text=el.innerText;persist()}};el.onpointerdown=e=>{if(state.tool!='select')return;e.preventDefault();selected=id;qs('.obj').forEach(x=>x.classList.toggle('activeObj',x.dataset.id==id));drag={x:e.clientX-o.x,y:e.clientY-o.y};el.setPointerCapture(e.pointerId)};el.onpointermove=e=>{if(!drag)return;o.x=e.clientX-drag.x;o.y=e.clientY-drag.y;o.w=el.offsetWidth;o.h=el.offsetHeight;el.style.left=o.x+'px';el.style.top=o.y+'px';persist()};el.onpointerup=()=>drag=null})}function downloadBoard(){capture();let c=$('#cv'),a=document.createElement('a');a.download='job-dues-tabula.png';a.href=c.toDataURL();a.click()}function saveProject(){capture();let a=document.createElement('a');a.download='job-dues-projekt.json';a.href=URL.createObjectURL(new Blob([JSON.stringify({state,objects,boardData},null,2)],{type:'application/json'}));a.click()}function loadProject(file){let r=new FileReader();r.onload=()=>{let p=JSON.parse(r.result);state=p.state||state;objects=p.objects||[];boardData=p.boardData||'';persist();board()};r.readAsText(file)}
function ann(){shell(`<section class="grid"><div class="panel"><h2>Nový oznam</h2><input id="at" class="field" placeholder="Nadpis"><textarea id="ab" class="field" placeholder="Text"></textarea><button class="action" onclick="items.ann.unshift({t:at.value,b:ab.value});store('ann',items.ann);ann()">Pridať</button></div>${items.ann.map(i=>`<article class="list"><h2>${esc(i.t)}</h2><p>${esc(i.b)}</p></article>`).join('')}</section>`)}function tasks(){let sts=['nové','rieši sa','hotové'];shell(`<section class="grid metrics">${sts.map(s=>`<div class="panel"><h2>${s}</h2>${items.tasks.filter(x=>x.s==s).map(x=>`<div class="list"><p>${esc(x.t)}</p>${sts.map(n=>`<button class="pill ${x.s==n?'active':''}" onclick="items.tasks[${items.tasks.indexOf(x)}].s='${n}';store('tasks',items.tasks);tasks()">${n}</button>`).join('')}</div>`).join('')}</div>`).join('')}</section>`)}function clients(){shell(`<section class="grid metrics">${items.clients.map((x,i)=>`<div class="panel"><h2>${esc(x.n)}</h2><h3>Chýbajúce doklady</h3><textarea class="field" onchange="items.clients[${i}].m=this.value;store('clients',items.clients)">${esc(x.m)}</textarea><h3>Poznámky</h3><textarea class="field" onchange="items.clients[${i}].p=this.value;store('clients',items.clients)">${esc(x.p)}</textarea></div>`).join('')}</section>`)}function docs(){shell(`<section class="grid home">${['Zmluvy','Faktúry','DPH reporty','Mzdové podklady','Interné smernice','Archív klientov'].map(x=>`<div class="card"><b>□</b><h2>${x}</h2></div>`).join('')}</section>`)}function ai(){shell(`<section class="panel"><h2>AI asistent</h2><div class="grid">${items.chat.map(m=>`<div class="chat ${m.r}">${esc(m.t)}</div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 130px;margin-top:14px"><input id="q" class="field" placeholder="Otázka"><button class="action" onclick="items.chat.push({r:'user',t:q.value},{r:'ai',t:'Demo odpoveď. OpenAI obrázky sú v digitálnej tabuli.'});store('chat',items.chat);ai()">Odoslať</button></div></section>`)}function analytics(){let m=[['Tržby','128 400 €'],['Náklady','74 900 €'],['Zisk','53 500 €'],['DPH','16 240 €'],['Pohľadávky','31 800 €'],['Záväzky','22 600 €']];shell(`<section class="grid metrics">${m.map(x=>`<div class="panel metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</section>`)}function render(){({home,board,ann,tasks,clients,docs,ai,analytics}[state.view]||home)()}render();
</script></body></html>
