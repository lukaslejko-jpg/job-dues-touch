<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080b10" />
    <title>JOB & DUES Touch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#080b10",
              panel: "#101722",
              mint: "#34d399",
              gold: "#fbbf24"
            }
          }
        }
      };
    </script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #080b10; color: white; font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
      button, input, textarea { font: inherit; }
      button { min-height: 64px; }
      .card { border: 1px solid rgba(255,255,255,.1); border-radius: 8px; background: linear-gradient(145deg, rgba(23,34,49,.96), rgba(13,19,29,.98)); padding: 28px; box-shadow: 0 20px 70px rgba(0,0,0,.28); }
      .card-btn { text-align: left; transition: transform .16s ease, border-color .16s ease; }
      .card-btn:hover, .card-btn:focus-visible { transform: translateY(-2px); border-color: rgba(52,211,153,.65); outline: none; }
      .action { display: inline-flex; width: 100%; min-height: 64px; align-items: center; justify-content: center; gap: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.08); padding: 14px 18px; color: white; font-size: 18px; font-weight: 800; }
      .action.active, .action:hover, .pill.active { background: #34d399; color: #080b10; }
      .field { width: 100%; border-radius: 8px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); padding: 18px; color: white; font-size: 20px; outline: none; }
      .field:focus { border-color: rgba(52,211,153,.8); }
      .field::placeholder { color: #94a3b8; }
      .list { border-radius: 8px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06); padding: 22px; }
      .pill { min-height: 48px; border-radius: 8px; background: rgba(255,255,255,.08); padding: 8px; color: #cbd5e1; font-size: 14px; font-weight: 800; }
      .chat { max-width: 82%; border-radius: 8px; padding: 18px 20px; font-size: 20px; line-height: 1.45; }
      .assistant { justify-self: start; background: rgba(255,255,255,.08); color: #e2e8f0; }
      .user { justify-self: end; background: #34d399; color: #08110d; font-weight: 700; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useRef, useState } = React;
      const icons = { board: "✎", announcements: "!", tasks: "✓", clients: "▦", documents: "□", assistant: "AI", analytics: "▥", home: "⌂" };
      const modules = [
        ["board", "Digitálna tabuľa", "Kreslenie, guma, uloženie"],
        ["announcements", "Firemné oznamy", "Dôležité správy tímu"],
        ["tasks", "Úlohy", "Nové, rieši sa, hotové"],
        ["clients", "Klienti", "Doklady, poznámky, detail"],
        ["documents", "Dokumenty", "Rýchly prehľad súborov"],
        ["assistant", "AI asistent", "Frontend pripravený na API"],
        ["analytics", "Analýzy", "Tržby, DPH, pohľadávky"]
      ];
      const store = {
        get: (k, f) => { try { return JSON.parse(localStorage.getItem(k)) ?? f; } catch { return f; } },
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
      };
      function useStored(key, fallback) {
        const [value, setValue] = useState(() => store.get(key, fallback));
        useEffect(() => store.set(key, value), [key, value]);
        return [value, setValue];
      }
      function Icon({ id }) { return <span className="grid h-16 w-16 place-items-center rounded-lg bg-white/10 text-2xl font-black text-mint">{icons[id]}</span>; }
      function Header({ active, setActive }) {
        const title = active === "home" ? "Domovská obrazovka" : modules.find(m => m[0] === active)?.[1];
        return <header className="flex flex-wrap items-center justify-between gap-5 border-b border-white/10 px-7 py-5 lg:px-10">
          <button className="flex items-center gap-4 rounded-lg p-2 text-left" onClick={() => setActive("home")}>
            <span className="grid h-14 w-14 place-items-center rounded-lg bg-mint text-2xl font-black text-ink">JD</span>
            <span><span className="block text-2xl font-black tracking-wide">JOB & DUES</span><span className="block text-base text-slate-300">firemný dotykový panel</span></span>
          </button>
          <div className="flex items-center gap-3 rounded-lg border border-white/10 bg-white/5 px-5 py-3 text-lg text-slate-200"><span>{icons[active]}</span>{title}</div>
        </header>;
      }
      function App() {
        const [active, setActive] = useState("home");
        return <main className="min-h-screen bg-ink text-white">
          <div className="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_20%_0%,rgba(52,211,153,.16),transparent_34%),linear-gradient(135deg,rgba(255,255,255,.05),transparent_42%)]"></div>
          <div className="relative flex min-h-screen flex-col">
            <Header active={active} setActive={setActive} />
            <section className="flex-1 px-6 py-7 lg:px-10">
              {active === "home" && <HomeScreen setActive={setActive} />}
              {active === "board" && <Board />}
              {active === "announcements" && <Announcements />}
              {active === "tasks" && <Tasks />}
              {active === "clients" && <Clients />}
              {active === "documents" && <Documents />}
              {active === "assistant" && <Assistant />}
              {active === "analytics" && <Analytics />}
            </section>
          </div>
        </main>;
      }
      function HomeScreen({ setActive }) {
        return <div className="mx-auto max-w-7xl">
          <div className="mb-8 flex flex-wrap items-end justify-between gap-5">
            <div><h1 className="text-4xl font-black lg:text-6xl">Vyberte modul</h1><p className="mt-3 max-w-2xl text-xl text-slate-300">Veľké ovládanie pre fullscreen monitor v kancelárii.</p></div>
            <div className="rounded-lg bg-mint px-5 py-3 text-lg font-bold text-ink">Online lokálne</div>
          </div>
          <div className="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">{modules.map(([id, title, hint]) =>
            <button key={id} className="card card-btn min-h-48" onClick={() => setActive(id)}><Icon id={id} /><span className="mt-8 block text-3xl font-black">{title}</span><span className="mt-3 block text-lg text-slate-300">{hint}</span></button>
          )}</div>
        </div>;
      }
      function Panel({ title, children }) { return <section className="card"><h2 className="mb-5 text-2xl font-black">{title}</h2>{children}</section>; }
      function Board() {
        const canvasRef = useRef(null), drawing = useRef(false);
        const [tool, setTool] = useState("pen"), [size, setSize] = useState(8);
        useEffect(() => {
          const canvas = canvasRef.current, ctx = canvas.getContext("2d");
          const resize = () => { const r = canvas.getBoundingClientRect(); canvas.width = Math.floor(r.width * devicePixelRatio); canvas.height = Math.floor(r.height * devicePixelRatio); ctx.scale(devicePixelRatio, devicePixelRatio); ctx.lineCap = "round"; ctx.lineJoin = "round"; };
          resize(); addEventListener("resize", resize); return () => removeEventListener("resize", resize);
        }, []);
        const point = e => { const r = canvasRef.current.getBoundingClientRect(), t = e.touches?.[0] ?? e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
        const start = e => { e.preventDefault(); drawing.current = true; const p = point(e), c = canvasRef.current.getContext("2d"); c.beginPath(); c.moveTo(p.x, p.y); };
        const move = e => { if (!drawing.current) return; e.preventDefault(); const c = canvasRef.current.getContext("2d"), p = point(e); c.globalCompositeOperation = tool === "eraser" ? "destination-out" : "source-over"; c.strokeStyle = "#e5fff5"; c.lineWidth = tool === "eraser" ? size * 2.2 : size; c.lineTo(p.x, p.y); c.stroke(); };
        const clear = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); };
        const save = () => { const a = document.createElement("a"); a.download = "job-dues-tabula.png"; a.href = canvasRef.current.toDataURL("image/png"); a.click(); };
        return <div className="grid h-[calc(100vh-150px)] gap-5 xl:grid-cols-[320px_1fr]">
          <Panel title="Nástroje"><div className="grid gap-4">
            <button className={"action " + (tool === "pen" ? "active" : "")} onClick={() => setTool("pen")}>✎ Pero</button>
            <button className={"action " + (tool === "eraser" ? "active" : "")} onClick={() => setTool("eraser")}>⌫ Guma</button>
            <label className="rounded-lg bg-white/5 p-4 text-lg"><span className="mb-3 block font-bold">Hrúbka čiary: {size}</span><input className="w-full accent-emerald-400" type="range" min="2" max="34" value={size} onChange={e => setSize(+e.target.value)} /></label>
            <button className="action" onClick={save}>Uložiť obrázok</button><button className="action" onClick={clear}>Vymazať tabuľu</button>
          </div></Panel>
          <canvas ref={canvasRef} className="h-full w-full touch-none rounded-lg border border-white/10 bg-slate-50 shadow-2xl" onMouseDown={start} onMouseMove={move} onMouseUp={() => drawing.current = false} onMouseLeave={() => drawing.current = false} onTouchStart={start} onTouchMove={move} onTouchEnd={() => drawing.current = false}></canvas>
        </div>;
      }
      function Announcements() {
        const [items, setItems] = useStored("jd-announcements", [{ id: 1, title: "Týždenná porada", body: "Pondelok 09:00 v zasadacej miestnosti.", date: "2026-06-01" }, { id: 2, title: "Kontrola dokladov", body: "Prosíme doplniť chýbajúce podklady ku klientom.", date: "2026-06-03" }]);
        const [form, setForm] = useState({ title: "", body: "" });
        const add = () => { if (!form.title.trim()) return; setItems([{ id: Date.now(), title: form.title, body: form.body, date: new Date().toISOString().slice(0, 10) }, ...items]); setForm({ title: "", body: "" }); };
        return <Two side={<AddForm form={form} setForm={setForm} add={add} button="Pridať oznam" />}>{items.map(i => <article className="list" key={i.id}><div className="text-sm font-bold text-mint">{i.date}</div><h2 className="mt-2 text-2xl font-black">{i.title}</h2><p className="mt-2 text-lg text-slate-300">{i.body}</p></article>)}</Two>;
      }
      function Tasks() {
        const statuses = ["nové", "rieši sa", "hotové"];
        const [tasks, setTasks] = useStored("jd-tasks", [{ id: 1, text: "Pripraviť mesačné výkazy", status: "rieši sa" }, { id: 2, text: "Doplniť poznámky ku klientovi NOVA s.r.o.", status: "nové" }, { id: 3, text: "Odoslať DPH report", status: "hotové" }]);
        const [text, setText] = useState("");
        const add = () => { if (!text.trim()) return; setTasks([{ id: Date.now(), text, status: "nové" }, ...tasks]); setText(""); };
        return <div className="grid gap-5 xl:grid-cols-[360px_1fr]"><Panel title="Nová úloha"><textarea className="field min-h-36" value={text} onChange={e => setText(e.target.value)} placeholder="Napíšte úlohu"></textarea><button className="action mt-4" onClick={add}>+ Pridať úlohu</button></Panel><div className="grid gap-5 lg:grid-cols-3">{statuses.map(s => <Panel title={s.toUpperCase()} key={s}><div className="grid gap-4">{tasks.filter(t => t.status === s).map(t => <div className="list" key={t.id}><p className="mb-4 text-xl font-bold">{t.text}</p><div className="grid grid-cols-3 gap-2">{statuses.map(n => <button className={"pill " + (t.status === n ? "active" : "")} key={n} onClick={() => setTasks(tasks.map(x => x.id === t.id ? { ...x, status: n } : x))}>{n}</button>)}</div></div>)}</div></Panel>)}</div></div>;
      }
      function Clients() {
        const [clients, setClients] = useStored("jd-clients", [{ id: 1, name: "NOVA s.r.o.", owner: "Jana Králová", missing: ["Bankové výpisy", "Prijaté faktúry"], notes: "Čakáme na podklady za máj." }, { id: 2, name: "ALFA Trade", owner: "Peter Urban", missing: ["Zmluva o spolupráci"], notes: "Prioritný klient, volať pred uzávierkou." }, { id: 3, name: "DUES Consulting", owner: "Mária Kováčová", missing: [], notes: "Doklady kompletné." }]);
        const [id, setId] = useState(clients[0]?.id), c = clients.find(x => x.id === id) ?? clients[0];
        const update = notes => setClients(clients.map(x => x.id === c.id ? { ...x, notes } : x));
        return <div className="grid gap-5 xl:grid-cols-[420px_1fr]"><Panel title="Klienti"><div className="grid gap-3">{clients.map(x => <button key={x.id} className={"grid min-h-20 gap-1 rounded-lg border border-white/10 bg-white/5 p-4 text-left " + (c?.id === x.id ? "border-emerald-300 bg-emerald-300/10" : "")} onClick={() => setId(x.id)}><span className="text-xl font-black">{x.name}</span><span className="text-slate-300">{x.owner}</span></button>)}</div></Panel>{c && <Panel title={c.name}><div className="mb-6 rounded-lg bg-white/5 p-5 text-xl"><span className="text-slate-300">Zodpovedná osoba: </span><strong>{c.owner}</strong></div><h3 className="mb-3 text-2xl font-black">Chýbajúce doklady</h3><div className="mb-7 grid gap-3 sm:grid-cols-2">{c.missing.length ? c.missing.map(d => <div className="rounded-lg border border-amber-300/30 bg-amber-300/10 p-4 text-lg" key={d}>{d}</div>) : <div className="rounded-lg border border-emerald-300/30 bg-emerald-300/10 p-4 text-lg">Všetko je kompletné</div>}</div><h3 className="mb-3 text-2xl font-black">Poznámky</h3><textarea className="field min-h-56" value={c.notes} onChange={e => update(e.target.value)}></textarea></Panel>}</div>;
      }
      function Documents() {
        return <div className="grid gap-5 md:grid-cols-2 xl:grid-cols-3">{["Zmluvy","Faktúry","DPH reporty","Mzdové podklady","Interné smernice","Archív klientov"].map(d => <div className="card" key={d}><Icon id="documents" /><h2 className="mt-8 text-3xl font-black">{d}</h2><p className="mt-3 text-lg text-slate-300">Priestor pripravený na napojenie firemného úložiska.</p><button className="action mt-8">Otvoriť</button></div>)}</div>;
      }
      function Assistant() {
        const [messages, setMessages] = useStored("jd-ai-chat", [{ role: "assistant", text: "Dobrý deň, som pripravený ako frontend pre AI asistenta JOB & DUES." }]);
        const [input, setInput] = useState("");
        const send = () => { if (!input.trim()) return; setMessages([...messages, { role: "user", text: input }, { role: "assistant", text: "Ukážková odpoveď. Sem sa neskôr napojí OpenAI API." }]); setInput(""); };
        return <div className="mx-auto grid max-w-5xl gap-5"><Panel title="AI asistent"><div className="mb-5 grid max-h-[52vh] gap-4 overflow-auto pr-2">{messages.map((m, i) => <div className={"chat " + m.role} key={i}>{m.text}</div>)}</div><div className="grid gap-3 md:grid-cols-[1fr_190px]"><input className="field" value={input} onChange={e => setInput(e.target.value)} placeholder="Napíšte otázku pre asistenta" onKeyDown={e => e.key === "Enter" && send()} /><button className="action" onClick={send}>Odoslať</button></div><p className="mt-4 text-slate-400">Miesto pre integráciu: OpenAI API endpoint, spracovanie kontextu a bezpečné firemné pravidlá.</p></Panel></div>;
      }
      function Analytics() {
        const cards = [["Tržby","128 400 €","+12 %"],["Náklady","74 900 €","-4 %"],["Zisk","53 500 €","+18 %"],["DPH","16 240 €","aktuálne"],["Pohľadávky","31 800 €","9 otvorených"],["Záväzky","22 600 €","6 otvorených"]];
        return <div className="grid gap-5 md:grid-cols-2 xl:grid-cols-3">{cards.map(([l,v,m]) => <div className="card" key={l}><div className="mb-7 flex items-center justify-between"><Icon id="analytics" /><span className="rounded-lg bg-white/10 px-4 py-2 text-lg text-slate-200">{m}</span></div><h2 className="text-xl text-slate-300">{l}</h2><p className="mt-2 text-4xl font-black">{v}</p><div className="mt-6 h-4 rounded-full bg-white/10"><div className="h-full rounded-full bg-mint" style={{ width: `${Math.max(18, parseInt(v.replace(/\D/g, ""), 10) / 128400 * 100)}%` }}></div></div></div>)}</div>;
      }
      function Two({ side, children }) { return <div className="grid gap-5 xl:grid-cols-[380px_1fr]"><Panel title="Pridať">{side}</Panel><div className="grid content-start gap-4">{children}</div></div>; }
      function AddForm({ form, setForm, add, button }) { return <div className="grid gap-4"><input className="field" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Nadpis" /><textarea className="field min-h-40" value={form.body} onChange={e => setForm({ ...form, body: e.target.value })} placeholder="Text oznamu"></textarea><button className="action" onClick={add}>{button}</button></div>; }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
