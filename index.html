<!doctype html><html lang="sk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JOB & DUES Touch</title><style>:root{--gold:#ddbf82;--bg:#07090d}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#07090d,#101722 55%,#080a0f);color:#fff;font-family:Inter,Segoe UI,Arial,sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(7,9,13,.93);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;padding:7px 10px}.brand img{height:56px;width:120px;object-fit:contain;background:#fff;border-radius:8px;padding:4px}.brand strong{display:block;font-size:21px}.brand span{color:#cbd5e1}.nav{display:flex;gap:8px;overflow:auto}.nav button,.action{min-height:44px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.07);color:#fff;padding:8px 12px;font-weight:850}.nav button.active,.nav button:hover,.action.active,.action:hover{background:var(--gold);color:#111}.status{text-align:right;color:#f7e5bd;font-weight:900;border:1px solid rgba(221,191,130,.3);border-radius:8px;padding:9px 12px;background:rgba(221,191,130,.1)}main{padding:18px}.grid{display:grid;gap:16px}.hero{margin-bottom:16px;min-height:210px;align-content:end;border:1px solid rgba(221,191,130,.22);border-radius:8px;background:linear-gradient(135deg,rgba(221,191,130,.2),rgba(255,255,255,.04),rgba(94,234,212,.08));padding:28px}.hero h1{margin:0;font-size:clamp(38px,5vw,76px)}.home{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.card,.panel{border:1px solid rgba(255,255,255,.11);border-radius:8px;background:linear-gradient(150deg,rgba(23,34,49,.92),rgba(8,13,20,.96));padding:20px;box-shadow:0 24px 80px rgba(0,0,0,.28)}.card{text-align:left;min-height:180px}.card b{display:grid;place-items:center;width:56px;height:56px;border:1px solid rgba(221,191,130,.35);border-radius:8px;background:rgba(221,191,130,.15);color:#f4d89d;font-size:24px}.field{width:100%;border:1px solid rgba(255,255,255,.13);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;padding:11px;outline:none}.list{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);padding:14px}.two{grid-template-columns:340px 1fr}.metrics{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.metric strong{display:block;font-size:34px;margin-top:8px}.pill{min-height:36px;border:0;border-radius:8px;background:rgba(255,255,255,.08);color:#cbd5e1;font-weight:800}.pill.active{background:var(--gold);color:#111}.board-layout{height:calc(100vh - 130px);display:grid;gap:12px;overflow:hidden}.board-layout.side{grid-template-columns:var(--panel-width,280px) minmax(0,1fr)}.board-layout.bottom{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) var(--panel-height,280px)}.board-layout.collapsed.side{grid-template-columns:54px minmax(0,1fr)}.board-layout.full{position:fixed;inset:0;z-index:80;height:100vh;background:#07090d;padding:10px}.tools{height:min(100%,var(--panel-height,640px));display:flex;flex-direction:column;overflow:hidden;width:var(--panel-width,280px);min-width:var(--panel-width,280px);max-width:var(--panel-width,280px);padding:10px}.bottom .tools{order:2;width:100%;max-width:none;min-width:0;height:var(--panel-height,280px)}.collapsed .tools{width:54px;min-width:54px;max-width:54px;padding:6px}.tools-body{overflow:auto;display:grid;gap:8px;padding-right:3px}.bottom .tools-body{display:flex;overflow-x:auto;overflow-y:hidden}.section{border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.04);padding:8px;min-width:0}.bottom .section{min-width:210px}.section h3,details summary{margin:0 0 7px;color:#f4d89d;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:950}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.mini.two{grid-template-columns:repeat(2,1fr)}.tools .action{min-height:34px;font-size:12px;padding:6px 7px}.collapsed .tools-body{grid-template-columns:repeat(2,25px);gap:7px;overflow:visible}.collapsed .tools .action{width:25px;height:25px;min-height:25px;padding:0;font-size:12px}.collapsed .hide{display:none}.range{display:grid;gap:5px;color:#cbd5e1;font-size:12px}.range input{width:100%}.canvas-wrap{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#fff}.canvas-wrap.gridbg{background-image:linear-gradient(rgba(221,191,130,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(221,191,130,.18) 1px,transparent 1px);background-size:40px 40px}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:2}.obj{position:absolute;z-index:3;border:3px solid transparent;border-radius:8px;touch-action:none;cursor:move}.obj.img{object-fit:contain;background:#fff}.obj.note{padding:10px;background:#fff7c2;color:#111;font-weight:800;white-space:pre-wrap}.obj.text{padding:10px;background:rgba(255,255,255,.86);color:#111;font-weight:800;white-space:pre-wrap}.activeObj{border-color:var(--gold);box-shadow:0 0 0 4px rgba(221,191,130,.25)}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.swatch{min-height:26px;border-radius:8px;border:2px solid rgba(255,255,255,.18)}.swatch.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(221,191,130,.25)}.noteSmall{color:#cbd5e1;font-size:12px;line-height:1.35}.chat{max-width:82%;padding:13px 15px;border-radius:8px;line-height:1.4}.chat.ai{background:rgba(255,255,255,.08)}.chat.user{justify-self:end;background:var(--gold);color:#111;font-weight:800}@media(max-width:900px){.top{grid-template-columns:1fr}.status{text-align:left}.two{grid-template-columns:1fr}.board-layout.side,.board-layout.bottom{height:calc(100vh - 205px);grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) var(--panel-height,260px)}.tools{order:2;width:100%;max-width:none;min-width:0;height:var(--panel-height,260px)}.tools-body{display:flex;overflow-x:auto;overflow-y:hidden}.section{min-width:205px}.brand img{height:48px}}</style></head><body><div id="root"></div><script>const $=s=>document.querySelector(s),qs=s=>[...document.querySelectorAll(s)],save=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}},uid=()=>Date.now()+Math.random().toString(16).slice(2);let state=load('jd-state',{view:'home',tool:'pen',color:'#2b2b2d',size:8,bg:'#fff',panel:'side',collapsed:false,full:false,grid:false,panelW:280,panelH:280});let objects=load('jd-board-objects',[]),boardData=load('jd-board-canvas',''),selected=null;const modules=[['home','⌂','Domov'],['board','✎','Digitálna tabuľa'],['ann','!','Firemné oznamy'],['tasks','✓','Úlohy'],['clients','▦','Klienti'],['docs','□','Dokumenty'],['ai','AI','AI asistent'],['analytics','▥','Analýzy']];function persist(){save('jd-state',state);save('jd-board-objects',objects);save('jd-board-canvas',boardData)}function capture(){let c=$('#cv');if(c&&c.width)boardData=c.toDataURL();persist()}function applyPanelSize(){let l=$('#layout'),t=$('.tools'),w=(+state.panelW||280)+'px',h=(+state.panelH||280)+'px';if(l){l.style.setProperty('--panel-width',w);l.style.setProperty('--panel-height',h)}if(t&&state.panel=='side'&&!state.collapsed){t.style.width=w;t.style.minWidth=w;t.style.maxWidth=w;t.style.height='min(100%,'+h+')'}let ow=$('#panelWidthText'),oh=$('#panelHeightText');if(ow)ow.textContent=state.panelW+' px';if(oh)oh.textContent=state.panelH+' px'}function shell(content){persist();document.body.innerHTML=`<header class="top"><button class="brand" onclick="go('home')"><img src="assets/logo-job-dues.svg" alt="JOB & DUES"><span><strong>JOB & DUES</strong><span>firemný dotykový panel</span></span></button><nav class="nav">${modules.map(m=>`<button class="${state.view==m[0]?'active':''}" onclick="go('${m[0]}')">${m[1]} ${m[2]}</button>`).join('')}</nav><div class="status">Dotykový režim</div></header><main>${content}</main>`}function go(v){capture();state.view=v;render()}function render(){({home,board,ann,tasks,clients,docs,ai,analytics}[state.view]||home)()}function home(){shell(`<section class="hero"><div>JOB & DUES</div><h1>Dotykový firemný panel</h1><p>Digitálna tabuľa, oznamy, úlohy, klienti, dokumenty, AI a analýzy.</p></section><section class="grid home">${modules.filter(m=>m[0]!='home').map(m=>`<button class="card" onclick="go('${m[0]}')"><b>${m[1]}</b><h2>${m[2]}</h2><p>Otvoriť modul</p></button>`).join('')}</section>`)}function board(){shell(`<section id="layout" class="board-layout ${state.panel} ${state.collapsed?'collapsed':''} ${state.full?'full':''}" style="--panel-width:${state.panelW}px;--panel-height:${state.panelH}px"><aside class="panel tools" style="width:${state.panelW}px;min-width:${state.panelW}px;max-width:${state.panelW}px;height:${state.panel=='bottom'?state.panelH+'px':'min(100%,'+state.panelH+'px)'}"><div class="tools-body"><button class="action" title="Zbaliť panel" onclick="state.collapsed=!state.collapsed;capture();board()">☰</button><div class="section hide"><h3>Panel</h3><div class="mini"><button class="action" onclick="state.panel=state.panel=='side'?'bottom':'side';capture();board()">${state.panel=='side'?'Dole':'Bok'}</button><button class="action" onclick="state.full=!state.full;capture();board()">${state.full?'Okno':'Full'}</button><button class="action" onclick="state.grid=!state.grid;capture();board()">Mriežka</button></div><label class="range">Šírka: <b id="panelWidthText">${state.panelW} px</b><input type="range" min="220" max="520" step="10" value="${state.panelW}" oninput="state.panelW=+this.value;persist();applyPanelSize()"></label><label class="range">Výška: <b id="panelHeightText">${state.panelH} px</b><input type="range" min="180" max="720" step="10" value="${state.panelH}" oninput="state.panelH=+this.value;persist();applyPanelSize()"></label><div class="mini two"><button class="action" onclick="state.panelH=Math.max(180,state.panelH-20);persist();applyPanelSize()">H-</button><button class="action" onclick="state.panelH=Math.min(720,state.panelH+20);persist();applyPanelSize()">H+</button></div></div><div class="section"><h3>Nástroje</h3><div class="mini">${[['pen','✎'],['high','▰'],['eraser','⌫'],['line','/'],['rect','□'],['select','↕'],['clear','×']].map(x=>`<button class="action ${state.tool==x[0]?'active':''}" onclick="setTool('${x[0]}')">${x[1]}</button>`).join('')}</div></div><div class="section hide"><h3>Farba</h3><div class="swatches">${['#2b2b2d','#0d0d0d','#ddbf82','#c9a768','#fff','#ef4444','#22c55e','#3b82f6','#f59e0b','#a855f7'].map(c=>`<button class="swatch ${state.color==c?'active':''}" style="background:${c}" onclick="state.color='${c}';state.tool='pen';capture();board()"></button>`).join('')}</div><input class="field" type="color" value="${state.color}" onchange="state.color=this.value;persist()"></div><div class="section hide"><h3>Čiara / pozadie</h3><label class="range">Hrúbka ${state.size}<input type="range" min="2" max="40" value="${state.size}" oninput="state.size=this.value;capture();board()"></label><input class="field" type="color" value="${state.bg}" onchange="state.bg=this.value;capture();board()"></div><details class="section hide"><summary>AI obrázok</summary><textarea id="imgPrompt" class="field" rows="3" placeholder="Napr. moderná kancelária JOB & DUES"></textarea><button class="action" onclick="createAiImage()">Vytvoriť obrázok</button><button class="action" onclick="objects=objects.filter(o=>o.type!='ai-image');capture();board()">Vymazať AI obrázky</button><p class="noteSmall">Rozbaľovací blok. Demo Pollinations bez API kľúča.</p></details><details class="section hide"><summary>Text / sticky</summary><textarea id="txt" class="field" rows="3" placeholder="Text alebo poznámka"></textarea><div class="mini two"><button class="action" onclick="addText('text')">Text</button><button class="action" onclick="addText('note')">Sticky</button></div></details><details class="section hide"><summary>Import / projekt</summary><input id="fileIn" type="file" accept="image/*" multiple hidden onchange="importImages(this.files)"><input id="projIn" type="file" accept="application/json,.json" hidden onchange="loadProject(this.files[0])"><button class="action" onclick="fileIn.click()">Import obrázkov</button><button class="action" onclick="saveProject()">Uložiť projekt</button><button class="action" onclick="projIn.click()">Načítať projekt</button></details><div class="section hide"><h3>Export</h3><div class="mini two"><button class="action" onclick="downloadBoard()">Obrázok</button><button class="action" onclick="clearBoard()">Vymazať</button></div></div></div></aside><div id="wrap" class="canvas-wrap ${state.grid?'gridbg':''}" style="background-color:${state.bg}">${objects.map(renderObj).join('')}<canvas id="cv"></canvas></div></section>`);applyPanelSize();setupCanvas();setupObjects()}function renderObj(o){if(o.kind=='note'||o.kind=='text')return `<div class="obj ${o.kind} ${selected==o.id?'activeObj':''}" data-id="${o.id}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;min-height:${o.h}px">${esc(o.text)}</div>`;return `<img class="obj img ${selected==o.id?'activeObj':''}" data-id="${o.id}" src="${o.src}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px">`}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function setTool(t){capture();if(t=='clear')return clearCanvasOnly();state.tool=t;persist();board()}function clearCanvasOnly(){let c=$('#cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);boardData='';persist()}function clearBoard(){if(confirm('Vymazať celú tabuľu?')){objects=[];boardData='';persist();board()}}function createAiImage(){capture();let prompt=($('#imgPrompt')?.value||'JOB & DUES modern corporate image').trim();let src='https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt+' clean corporate dark gold')+'?width=900&height=600&nologo=true&seed='+Date.now();objects.push({id:uid(),type:'ai-image',src,x:90,y:90,w:360,h:240});selected=objects.at(-1).id;persist();board()}function importImages(files){capture();[...files].forEach(f=>{let r=new FileReader();r.onload=()=>{objects.push({id:uid(),type:'image',src:r.result,x:80,y:80,w:320,h:220});persist();board()};r.readAsDataURL(f)})}function addText(kind){capture();let text=($('#txt')?.value||'Poznámka').trim();objects.push({id:uid(),kind,type:kind,text,x:110,y:110,w:230,h:90});selected=objects.at(-1).id;persist();board()}function setupObjects(){qs('.obj').forEach(el=>{let id=el.dataset.id,o=objects.find(x=>x.id==id),drag=null;el.onpointerdown=e=>{if(state.tool!='select'&&el.classList.contains('note'))return;selected=id;drag={x:e.clientX-o.x,y:e.clientY-o.y};el.setPointerCapture(e.pointerId);el.classList.add('activeObj')};el.onpointermove=e=>{if(!drag)return;o.x=e.clientX-drag.x;o.y=e.clientY-drag.y;el.style.left=o.x+'px';el.style.top=o.y+'px';persist()};el.onpointerup=()=>drag=null;el.ondblclick=()=>{if(o.kind){let t=prompt('Upraviť text',o.text);if(t!==null){o.text=t;persist();board()}}}})}function setupCanvas(){let c=$('#cv'),w=$('#wrap'),ctx=c.getContext('2d'),drawing=false,last=null,snap=null;function resize(){let r=w.getBoundingClientRect();c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(boardData){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=boardData}}new ResizeObserver(resize).observe(w);setTimeout(resize,50);function p(e){let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){if(state.tool=='select')return;e.preventDefault();drawing=true;last=p(e);snap=ctx.getImageData(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round'}function move(e){if(!drawing)return;e.preventDefault();let q=p(e);ctx.strokeStyle=state.tool=='eraser'?state.bg:state.tool=='high'?'rgba(221,191,130,.35)':state.color;ctx.lineWidth=state.tool=='high'?state.size*2:state.size;if(['line','rect'].includes(state.tool)){ctx.putImageData(snap,0,0);ctx.beginPath();if(state.tool=='line'){ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y)}else ctx.rect(last.x,last.y,q.x-last.x,q.y-last.y);ctx.stroke();return}ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q}function stop(){if(drawing){drawing=false;capture()}}['mousedown','touchstart'].forEach(e=>c.addEventListener(e,start));['mousemove','touchmove'].forEach(e=>c.addEventListener(e,move));['mouseup','mouseleave','touchend'].forEach(e=>c.addEventListener(e,stop))}function downloadBoard(){capture();let c=$('#cv'),a=document.createElement('a');a.download='job-dues-tabula.png';a.href=c.toDataURL();a.click()}function saveProject(){capture();let a=document.createElement('a');a.download='job-dues-projekt.json';a.href=URL.createObjectURL(new Blob([JSON.stringify({state,objects,boardData},null,2)],{type:'application/json'}));a.click()}function loadProject(file){let r=new FileReader();r.onload=()=>{let p=JSON.parse(r.result);state=p.state||state;objects=p.objects||[];boardData=p.boardData||'';persist();board()};r.readAsText(file)}function ann(){let items=load('ann',[{t:'Týždenná porada',b:'Pondelok 09:00 v zasadacej miestnosti.'}]);shell(`<section class="two grid"><div class="panel"><h2>Nový oznam</h2><input id="at" class="field" placeholder="Nadpis"><textarea id="ab" class="field" placeholder="Text"></textarea><button class="action" onclick="items.unshift({t:at.value,b:ab.value});save('ann',items);ann()">Pridať</button></div><div class="grid">${items.map(i=>`<article class="list"><h2>${i.t}</h2><p>${i.b}</p></article>`).join('')}</div></section>`)}function tasks(){let a=load('tasks',[{t:'Pripraviť mesačné výkazy',s:'rieši sa'}]),sts=['nové','rieši sa','hotové'];shell(`<section class="two grid"><div class="panel"><h2>Nová úloha</h2><input id="nt" class="field"><button class="action" onclick="a.unshift({t:nt.value,s:'nové'});save('tasks',a);tasks()">Pridať</button></div><div class="grid metrics">${sts.map(s=>`<div class="panel"><h2>${s}</h2>${a.filter(x=>x.s==s).map(x=>`<div class="list"><p>${x.t}</p>${sts.map(n=>`<button class="pill ${x.s==n?'active':''}" onclick="a[${a.indexOf(x)}].s='${n}';save('tasks',a);tasks()">${n}</button>`).join('')}</div>`).join('')}</div>`).join('')}</div></section>`)}function clients(){let c=load('clients',[{n:'NOVA s.r.o.',m:'Bankové výpisy, prijaté faktúry',p:'Čakáme na podklady za máj.'},{n:'ALFA Trade',m:'Zmluva o spolupráci',p:'Prioritný klient.'}]);shell(`<section class="grid metrics">${c.map(x=>`<div class="panel"><h2>${x.n}</h2><h3>Chýbajúce doklady</h3><p>${x.m||'Všetko kompletné'}</p><h3>Poznámky</h3><textarea class="field" onchange="x.p=this.value;save('clients',c)">${x.p}</textarea></div>`).join('')}</section>`)}function docs(){shell(`<section class="grid home">${['Zmluvy','Faktúry','DPH reporty','Mzdové podklady','Interné smernice','Archív klientov'].map(x=>`<div class="card"><b>□</b><h2>${x}</h2><p>Priestor pripravený na napojenie firemného úložiska.</p></div>`).join('')}</section>`)}function ai(){let msgs=load('chat',[{r:'ai',t:'Dobrý deň, som AI asistent JOB & DUES. Obrázky sú v Digitálnej tabuli v rozbaľovacej sekcii AI obrázok.'}]);shell(`<section class="panel"><h2>AI asistent</h2><div class="grid">${msgs.map(m=>`<div class="chat ${m.r}">${m.t}</div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 160px;margin-top:14px"><input id="q" class="field" placeholder="Napíšte otázku"><button class="action" onclick="msgs.push({r:'user',t:q.value},{r:'ai',t:'Demo odpoveď: AI chat je pripravený na napojenie API. Obrázky generujte v module Digitálna tabuľa.'});save('chat',msgs);ai()">Odoslať</button></div></section>`)}function analytics(){let m=[['Tržby','128 400 €'],['Náklady','74 900 €'],['Zisk','53 500 €'],['DPH','16 240 €'],['Pohľadávky','31 800 €'],['Záväzky','22 600 €']];shell(`<section class="grid metrics">${m.map(x=>`<div class="panel metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</section>`)}render();</script></body></html>
