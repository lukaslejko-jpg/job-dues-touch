lex;justify-content:space-between;gap:8px;min-height:34px;padding:8px;color:#f4d89d;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:950;cursor:pointer}.win summary:after{content:'-'}.win:not([open]) summary:after{content:'+'}.win-body{padding:0 8px 8px;display:grid;gap:8px}.iconbar{display:none}.collapsed .iconbar{display:grid;grid-template-columns:1fr;gap:6px;align-content:start}.collapsed.bottom .iconbar{display:flex;gap:6px;flex-wrap:nowrap;width:max-content}.collapsed.bottom.icons2 .iconbar{display:grid;grid-auto-flow:column;grid-template-rows:repeat(2,40px);grid-auto-columns:40px;gap:6px}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.mini.two{grid-template-columns:repeat(2,1fr)}.tools .action{min-height:34px;font-size:12px;padding:6px 7px}.icon{width:40px;min-width:40px;height:40px;min-height:40px;padding:0;font-size:17px}.range{display:grid;gap:5px;color:#cbd5e1;font-size:12px}.range input{width:100%}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.swatch{min-height:30px;border-radius:8px;border:2px solid rgba(255,255,255,.18)}.swatch.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(221,191,130,.25)}.canvas-wrap{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#fff;min-height:0}.canvas-wrap.gridbg{background-image:linear-gradient(rgba(221,191,130,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(221,191,130,.18) 1px,transparent 1px);background-size:40px 40px}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:20}.selecting canvas{pointer-events:none}.obj{position:absolute;z-index:10;border:3px solid transparent;border-radius:8px;touch-action:none;cursor:move;resize:both;overflow:auto}.obj.img{object-fit:contain;background:#fff}.obj.note{padding:10px;background:#fff7c2;color:#111;font-weight:800;white-space:pre-wrap}.obj.text{padding:10px;background:rgba(255,255,255,.88);color:#111;font-weight:800;white-spac Vytvoriť obrázok</button><button class="action" onclick="objects=objects.filter(o=>o.type!='ai-image');capture();board()">Vymazať AI obrázky</button>`,false)}${win('Text / sticky',`<textarea id="txt" class="field" rows="3" placeholder="Text alebo poznámka"></textarea><div class="mini two"><button class="action" onclick="addText('text')">Text</button><button class="action" onclick="addText('note')">Sticky</button></div>`,false)}${win('Import / projekt',`<button class="action" onclick="fileIn.click()">Import obrázkov</button><button class="action" onclick="saveProject()">Uložiť projekt</button><button class="action" onclick="projIn.click()">Načítať projekt</button>`,false)}${win('Export',`<div class="mini two"><button class="action" onclick="downloadBoard()">Obrázok</button><button class="action" onclick="clearBoard()">Vymazať</button></div>`,false)}</div></aside><div id="wrap" class="canvas-wrap ${state.grid?'gridbg':''} ${state.tool=='select'?'selecting':''}" style="background-color:${state.bg}">${objects.map(renderObj).join('')}<canvas id="cv"></canvas></div></section>`,'board-page');applyPanel();setupCanvas();setupObjects()}function applyPanel(){let l=$('#layout');if(l){l.style.setProperty('--pw',state.panelW+'px');l.style.setProperty('--ph',state.panelH+'px')}persist()}function togglePanel(){state.panel=state.panel==='side'?'bottom':'side';state.collapsed=true;persist();board()}function renderObj(o){if(o.kind=='note'||o.kind=='text')return `<div contenteditable class="obj ${o.kind} ${selected==o.id?'activeObj':''}" data-id="${o.id}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;min-height:${o.h}px">${esc(o.text)}</div>`;return `<img class="obj img ${selected==o.id?'activeObj':''}" data-id="${o.id}" src="${o.src}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px">`}function setTool(t){capture();if(t=='undo')return undoBoard();if(t=='clear')return clearCanvasOnly();state.tool=t;persist();board()}function clearCanvasOnly(){pushUndo();let c=$('#cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);boardData='';persist()}function undoBoard(){let c=$('#cv');if(!c||!undoStack.length)return;let prev=undoStack.pop(),x=c.getContext('2d'),img=new Image();img.onload=()=>{x.clearRect(0,0,c.width,c.height);x.drawImage(img,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);boardData=prev;persist()};img.src=prev}function clearBoard(){if(confirm('Vymazať celú tabuľu?')){pushUndo();objects=[];boardData='';persist();board()}}function addText(kind){capture();let text=($('#txt')?.value||'Poznámka').trim();objects.push({id:uid(),kind,type:kind,text,x:70,y:70,w:230,h:90});selected=objects.at(-1).id;persist();state.tool='select';board()}function createAiImage(){capture();let prompt=($('#imgPrompt')?.value||'JOB & DUES modern corporate image').trim();objects.push({id:uid(),type:'ai-image',src:'https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt+' clean corporate dark gold')+'?width=900&height=600&nologo=true&seed='+Date.now(),x:70,y:70,w:320,h:220});selected=objects.at(-1).id;persist();state.tool='select';board()}function importImages(files){capture();[...files].forEach(f=>{let r=new FileReader();r.onload=()=>{objects.push({id:uid(),type:'image',src:r.result,x:70,y:70,w:300,h:210});persist();state.tool='select';board()};r.readAsDataURL(f)})}function drawArrow(ctx,a,b){let ang=Math.atan2(b.y-a.y,b.x-a.x),h=Math.max(14,state.size*2.4);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-h*Math.cos(ang-Math.PI/6),b.y-h*Math.sin(ang-Math.PI/6));ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-h*Math.cos(ang+Math.PI/6),b.y-h*Math.sin(ang+Math.PI/6))}function setupCanvas(){let c=$('#cv'),w=$('#wrap');if(!c||!w)return;let ctx=c.getContext('2d'),drawing=false,last=null,snap=null;function resize(){let r=w.getBoundingClientRect(),old=boardData;c.width=Math.max(1,Math.floor(r.width*devicePixelRatio));c.height=Math.max(1,Math.floor(r.height*devicePixelRatio));ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(old){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old}}new ResizeObserver(resize).observe(w);setTimeout(resize,60);function p(e){let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){if(state.tool=='select')return;e.preventDefault();pushUndo();drawing=true;last=p(e);snap=ctx.getImageData(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round'}function move(e){if(!drawing)return;e.preventDefault();let q=p(e);ctx.strokeStyle=state.tool=='eraser'?state.bg:state.tool=='high'?'rgba(221,191,130,.35)':state.color;ctx.lineWidth=state.tool=='high'?state.size*2:state.size;if(['line','rect','arrow'].includes(state.tool)){ctx.putImageData(snap,0,0);ctx.beginPath();if(state.tool=='line'){ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y)}else if(state.tool=='arrow')drawArrow(ctx,last,q);else ctx.rect(last.x,last.y,q.x-last.x,q.y-last.y);ctx.stroke();return}ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q}function stop(){if(drawing){drawing=false;capture()}}['mousedown','touchstart'].forEach(e=>c.addEventListener(e,start,{passive:false}));['mousemove','touchmove'].forEach(e=>c.addEventListener(e,move,{passive:false}));['mouseup','mouseleave','touchend','touchcancel'].forEach(e=>c.addEventListener(e,stop,{passive:false}))}function setupObjects(){qs('.obj').forEach(el=>{let id=el.dataset.id,o=objects.find(x=>x.id==id),drag=null;el.oninput=()=>{if(o.kind){o.text=el.innerText;persist()}};el.onpointerdown=e=>{if(state.tool!='select')return;e.preventDefault();selected=id;drag={x:e.clientX-o.x,y:e.clientY-o.y};el.setPointerCapture(e.pointerId);el.classList.add('activeObj')};el.onpointermove=e=>{if(!drag)return;o.x=e.clientX-drag.x;o.y=e.clientY-drag.y;o.w=el.offsetWidth;o.h=el.offsetHeight;el.style.left=o.x+'px';el.style.top=o.y+'px';persist()};el.onpointerup=()=>drag=null})}function downloadBoard(){capture();let c=$('#cv'),a=document.createElement('a');a.download='job-dues-tabula.png';a.href=c.toDataURL();a.click()}function saveProject(){capture();let a=document.createElement('a');a.download='job-dues-projekt.json';a.href=URL.createObjectURL(new Blob([JSON.stringify({state,objects,boardData},null,2)],{type:'application/json'}));a.click()}function loadProject(file){let r=new FileReader();r.onload=()=>{let p=JSON.parse(r.result);state=p.state||state;objects=p.objects||[];boardData=p.boardData||'';persist();board()};r.readAsText(file)}function ann(){shell(`<section class="grid"><div class="panel"><h2>Nový oznam</h2><input id="at" class="field" placeholder="Nadpis"><textarea id="ab" class="field" placeholder="Text"></textarea><button class="action" onclick="items.ann.unshift({t:at.value,b:ab.value});store('ann',items.ann);ann()">Pridať</button></div>${items.ann.map(i=>`<article class="list"><h2>${esc(i.t)}</h2><p>${esc(i.b)}</p></article>`).join('')}</section>`)}function tasks(){let sts=['nové','rieši sa','hotové'];shell(`<section class="grid metrics">${sts.map(s=>`<div class="panel"><h2>${s}</h2>${items.tasks.filter(x=>x.s==s).map(x=>`<div class="list"><p>${esc(x.t)}</p>${sts.map(n=>`<button class="pill ${x.s==n?'active':''}" onclick="items.tasks[${items.tasks.indexOf(x)}].s='${n}';store('tasks',items.tasks);tasks()">${n}</button>`).join('')}</div>`).join('')}</div>`).join('')}</section>`)}function clients(){shell(`<section class="grid metrics">${items.clients.map((x,i)=>`<div class="panel"><h2>${esc(x.n)}</h2><h3>Chýbajúce doklady</h3><textarea class="field" onchange="items.clients[${i}].m=this.value;store('clients',items.clients)">${esc(x.m)}</textarea><h3>Poznámky</h3><textarea class="field" onchange="items.clients[${i}].p=this.value;store('clients',items.clients)">${esc(x.p)}</textarea></div>`).join('')}</section>`)}function docs(){shell(`<section class="grid home">${['Zmluvy','Faktúry','DPH reporty','Mzdové podklady','Interné smernice','Archív klientov'].map(x=>`<div class="card"><b>□</b><h2>${x}</h2></div>`).join('')}</section>`)}function ai(){shell(`<section class="panel"><h2>AI asistent</h2><div class="grid">${items.chat.map(m=>`<div class="chat ${m.r}">${esc(m.t)}</div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 130px;margin-top:14px"><input id="q" class="field" placeholder="Otázka"><button class="action" onclick="items.chat.push({r:'user',t:q.value},{r:'ai',t:'Demo odpoveď: API sa dá napojiť neskôr.'});store('chat',items.chat);ai()">Odoslať</button></div></section>`)}function analytics(){let m=[['Tržby','128 400 €'],['Náklady','74 900 €'],['Zisk','53 500 €'],['DPH','16 240 €'],['Pohľadávky','31 800 €'],['Záväzky','22 600 €']];shell(`<section class="grid metrics">${m.map(x=>`<div class="panel metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</section>`)}function render(){({home,board,ann,tasks,clients,docs,ai,analytics}[state.view]||home)()}render();</script></body></html>
