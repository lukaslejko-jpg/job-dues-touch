<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>JOB & DUES Touch</title>
<style>
:root{--bg:#07090d;--gold:#ddbf82;--ink:#2b2b2d;--muted:#94a3b8;--mint:#5eead4}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#07090d,#101722 55%,#080a0f);color:#fff;font-family:Inter,Segoe UI,Arial,sans-serif;-webkit-tap-highlight-color:transparent}button,input,textarea{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(7,9,13,.92);backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);border-radius:8px;padding:8px 12px;color:white}.brand img{height:58px;width:116px;object-fit:contain;background:#fff;border-radius:8px;padding:5px}.brand strong{display:block;font-size:22px}.brand span{color:#cbd5e1}.nav{display:flex;gap:8px;overflow:auto}.nav button,.action{min-height:50px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.07);color:white;padding:10px 14px;font-weight:850}.nav button.active,.nav button:hover,.action.active,.action:hover{background:var(--gold);color:#0d0d0d}.status{text-align:right;color:#f7e5bd;font-weight:900;border:1px solid rgba(221,191,130,.3);border-radius:8px;padding:10px 14px;background:rgba(221,191,130,.1)}main{padding:22px}.grid{display:grid;gap:18px}.home{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.hero{margin-bottom:18px;min-height:210px;align-content:end;background:linear-gradient(135deg,rgba(221,191,130,.2),rgba(255,255,255,.04),rgba(94,234,212,.08));border:1px solid rgba(221,191,130,.22);border-radius:8px;padding:30px}.hero h1{margin:0;font-size:clamp(38px,5vw,76px)}.card,.panel{border:1px solid rgba(255,255,255,.11);border-radius:8px;background:linear-gradient(150deg,rgba(23,34,49,.92),rgba(8,13,20,.96));padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.28)}.card{text-align:left;min-height:190px}.card b{display:grid;place-items:center;width:58px;height:58px;border:1px solid rgba(221,191,130,.35);border-radius:8px;background:rgba(221,191,130,.15);color:#f4d89d;font-size:24px}.card h2{font-size:28px;margin:28px 0 8px}.card p{color:#cbd5e1;font-size:18px}.field{width:100%;border:1px solid rgba(255,255,255,.13);border-radius:8px;background:rgba(255,255,255,.06);color:white;padding:14px;outline:none}.field:focus{border-color:var(--gold)}.list{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);padding:16px}.two{grid-template-columns:340px 1fr}.board-layout{height:calc(100vh - 142px);display:grid;grid-template-columns:300px 1fr;gap:14px;overflow:hidden}.board-layout.bottom{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto}.board-layout.full{position:fixed;inset:0;z-index:80;height:100vh;background:#07090d;padding:12px}.tools{height:100%;display:flex;flex-direction:column;overflow:hidden}.bottom .tools{order:2;height:min(34vh,280px)}.tools-body{overflow:auto;display:grid;gap:10px;padding-right:4px}.bottom .tools-body{display:flex;overflow-x:auto;overflow-y:hidden}.section{border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.04);padding:10px;min-width:230px}.section h3{margin:0 0 8px;color:#f4d89d;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tools .action{min-height:38px;font-size:13px;padding:7px 8px}.collapsed{grid-template-columns:54px 1fr}.collapsed .tools{padding:6px}.collapsed .tools-body{grid-template-columns:repeat(2,26px);gap:7px;overflow:visible}.collapsed .tools .action{width:26px;height:26px;min-height:26px;padding:0;font-size:12px}.collapsed .hide-small{display:none}.canvas-wrap{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:white}.canvas-wrap.gridbg{background-image:linear-gradient(rgba(221,191,130,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(221,191,130,.18) 1px,transparent 1px);background-size:40px 40px}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.board-img{position:absolute;z-index:3;left:80px;top:80px;width:280px;height:180px;border:3px solid transparent;border-radius:8px;object-fit:contain;background:#fff;touch-action:none;cursor:move}.board-img.active{border-color:var(--gold);box-shadow:0 0 0 4px rgba(221,191,130,.25)}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.swatch{min-height:30px;border-radius:8px;border:2px solid rgba(255,255,255,.18)}.swatch.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(221,191,130,.25)}.chat{max-width:82%;padding:14px 16px;border-radius:8px;line-height:1.4}.chat.ai{background:rgba(255,255,255,.08)}.chat.user{justify-self:end;background:var(--gold);color:#111;font-weight:800}.metrics{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.metric strong{display:block;font-size:34px;margin-top:8px}.pill{min-height:38px;border:0;border-radius:8px;background:rgba(255,255,255,.08);color:#cbd5e1;font-weight:800}.pill.active{background:var(--gold);color:#111}.note{color:#cbd5e1;font-size:13px;line-height:1.35}@media(max-width:900px){.top{grid-template-columns:1fr}.status{text-align:left}.two{grid-template-columns:1fr}.board-layout{height:calc(100vh - 210px);grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto}.tools{order:2;height:260px}.tools-body{display:flex;overflow-x:auto;overflow-y:hidden}.brand img{height:50px}}
</style>
</head>
<body><div id="root"></div><script>
const $=s=>document.querySelector(s);const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));const load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}};const uid=()=>Date.now()+Math.random().toString(16).slice(2);
const modules=[['home','⌂','Domov'],['board','✎','Digitálna tabuľa'],['ann','!','Firemné oznamy'],['tasks','✓','Úlohy'],['clients','▦','Klienti'],['docs','□','Dokumenty'],['ai','AI','AI asistent'],['analytics','▥','Analýzy']];let state=load('jd-state',{view:'home',tool:'pen',color:'#2b2b2d',size:8,bg:'#fff',panel:'side',collapsed:false,full:false,grid:false});let images=load('jd-board-images',[]);let selectedImg=null;
function persist(){save('jd-state',state);save('jd-board-images',images)}function shell(content){persist();document.body.innerHTML=`<header class="top"><button class="brand" onclick="go('home')"><img src="assets/logo-job-dues.svg" alt="JOB & DUES"><span><strong>JOB & DUES</strong><span>firemný dotykový panel</span></span></button><nav class="nav">${modules.map(m=>`<button class="${state.view==m[0]?'active':''}" onclick="go('${m[0]}')">${m[1]} ${m[2]}</button>`).join('')}</nav><div class="status">Dotykový režim</div></header><main>${content}</main>`}function go(v){state.view=v;render()}function render(){({home,board,ann,tasks,clients,docs,ai,analytics}[state.view]||home)()}
function home(){shell(`<section class="hero"><div>JOB & DUES</div><h1>Dotykový firemný panel</h1><p>Digitálna tabuľa, oznamy, úlohy, klienti, dokumenty, AI a analýzy.</p></section><section class="grid home">${modules.filter(m=>m[0]!='home').map(m=>`<button class="card" onclick="go('${m[0]}')"><b>${m[1]}</b><h2>${m[2]}</h2><p>Otvoriť modul</p></button>`).join('')}</section>`)}
function board(){shell(`<section id="layout" class="board-layout ${state.panel=='bottom'?'bottom':''} ${state.collapsed?'collapsed':''} ${state.full?'full':''}"><aside class="panel tools"><div class="tools-body"><button class="action" onclick="state.collapsed=!state.collapsed;board()">☰</button><div class="section hide-small"><h3>Panel</h3><div class="mini"><button class="action" onclick="state.panel=state.panel=='side'?'bottom':'side';board()">${state.panel=='side'?'Dole':'Bok'}</button><button class="action" onclick="state.full=!state.full;board()">${state.full?'Okno':'Full'}</button><button class="action" onclick="state.grid=!state.grid;board()">Mriežka</button></div></div><div class="section"><h3>Nástroje</h3><div class="mini">${[['pen','✎'],['high','▰'],['eraser','⌫'],['line','/'],['rect','□'],['clear','×']].map(x=>`<button class="action ${state.tool==x[0]?'active':''}" onclick="tool('${x[0]}')">${x[1]}</button>`).join('')}</div></div><div class="section hide-small"><h3>Farba</h3><div class="swatches">${['#2b2b2d','#0d0d0d','#ddbf82','#c9a768','#ffffff','#ef4444','#22c55e','#3b82f6','#f59e0b','#a855f7'].map(c=>`<button class="swatch ${state.color==c?'active':''}" style="background:${c}" onclick="state.color='${c}';state.tool='pen';board()"></button>`).join('')}</div><input class="field" type="color" value="${state.color}" onchange="state.color=this.value;persist()"></div><div class="section hide-small"><h3>Čiara a pozadie</h3><label>Hrúbka ${state.size}<input type="range" min="2" max="40" value="${state.size}" oninput="state.size=this.value;board()"></label><input class="field" type="color" value="${state.bg}" onchange="state.bg=this.value;board()"></div><div class="section hide-small"><h3>AI obrázok</h3><textarea id="imgPrompt" class="field" rows="4" placeholder="Napr. moderná kancelária JOB & DUES, zlaté detaily"></textarea><button class="action" onclick="createAiImage()">Vytvoriť obrázok na tabuľu</button><button class="action" onclick="images=[];persist();board()">Vymazať AI obrázky</button><p class="note">Používa demo generovanie Pollinations bez API kľúča. Obrázok sa vloží priamo na tabuľu a dá sa presúvať.</p></div><div class="section hide-small"><h3>Export</h3><button class="action" onclick="downloadBoard()">Uložiť obrázok</button></div></div></aside><div id="wrap" class="canvas-wrap ${state.grid?'gridbg':''}" style="background-color:${state.bg}">${images.map(i=>`<img class="board-img ${selectedImg==i.id?'active':''}" data-id="${i.id}" src="${i.src}" style="left:${i.x}px;top:${i.y}px;width:${i.w}px;height:${i.h}px">`).join('')}<canvas id="cv"></canvas></div></section>`);setupCanvas();setupImages()}function tool(t){if(t=='clear'){let c=$('#cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);return}state.tool=t;board()}function createAiImage(){let prompt=($('#imgPrompt')?.value||'JOB & DUES modern corporate image').trim();let src='https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt+' corporate clean dark gold style')+'?width=900&height=600&nologo=true&seed='+Date.now();images.push({id:uid(),src,x:90,y:90,w:360,h:240});selectedImg=images[images.length-1].id;persist();board()}function setupImages(){document.querySelectorAll('.board-img').forEach(el=>{let id=el.dataset.id,img=images.find(x=>x.id==id),drag=null;el.onpointerdown=e=>{selectedImg=id;drag={x:e.clientX-img.x,y:e.clientY-img.y};el.setPointerCapture(e.pointerId);board()};el.onpointermove=e=>{if(!drag)return;img.x=e.clientX-drag.x;img.y=e.clientY-drag.y;el.style.left=img.x+'px';el.style.top=img.y+'px';persist()};el.onpointerup=()=>drag=null})}function setupCanvas(){let c=$('#cv'),w=$('#wrap'),ctx=c.getContext('2d'),drawing=false,last=null,snap=null;function resize(){let old=c.width?c.toDataURL():'';let r=w.getBoundingClientRect();c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(old){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old}}new ResizeObserver(resize).observe(w);setTimeout(resize,50);function p(e){let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){e.preventDefault();drawing=true;last=p(e);snap=ctx.getImageData(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round'}function move(e){if(!drawing)return;e.preventDefault();let q=p(e);ctx.strokeStyle=state.tool=='eraser'?state.bg:state.tool=='high'?'rgba(221,191,130,.35)':state.color;ctx.lineWidth=state.tool=='high'?state.size*2:state.size;if(['line','rect'].includes(state.tool)){ctx.putImageData(snap,0,0);ctx.beginPath();if(state.tool=='line'){ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y)}else ctx.rect(last.x,last.y,q.x-last.x,q.y-last.y);ctx.stroke();return}ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q}function stop(){drawing=false}['mousedown','touchstart'].forEach(e=>c.addEventListener(e,start));['mousemove','touchmove'].forEach(e=>c.addEventListener(e,move));['mouseup','mouseleave','touchend'].forEach(e=>c.addEventListener(e,stop))}function downloadBoard(){let c=$('#cv'),a=document.createElement('a');a.download='job-dues-tabula.png';a.href=c.toDataURL();a.click()}
function ann(){let items=load('ann',[{t:'Týždenná porada',b:'Pondelok 09:00 v zasadacej miestnosti.'}]);shell(`<section class="two grid"><div class="panel"><h2>Nový oznam</h2><input id="at" class="field" placeholder="Nadpis"><textarea id="ab" class="field" placeholder="Text"></textarea><button class="action" onclick="items.unshift({t:at.value,b:ab.value});save('ann',items);ann()">Pridať</button></div><div class="grid">${items.map(i=>`<article class="list"><h2>${i.t}</h2><p>${i.b}</p></article>`).join('')}</div></section>`)}
function tasks(){let a=load('tasks',[{t:'Pripraviť mesačné výkazy',s:'rieši sa'}]),sts=['nové','rieši sa','hotové'];shell(`<section class="two grid"><div class="panel"><h2>Nová úloha</h2><input id="nt" class="field"><button class="action" onclick="a.unshift({t:nt.value,s:'nové'});save('tasks',a);tasks()">Pridať</button></div><div class="grid metrics">${sts.map(s=>`<div class="panel"><h2>${s}</h2>${a.filter(x=>x.s==s).map(x=>`<div class="list"><p>${x.t}</p>${sts.map(n=>`<button class="pill ${x.s==n?'active':''}" onclick="a.find(y=>y.t=='${x.t}').s='${n}';save('tasks',a);tasks()">${n}</button>`).join('')}</div>`).join('')}</div>`).join('')}</div></section>`)}
function clients(){let c=load('clients',[{n:'NOVA s.r.o.',m:'Bankové výpisy, prijaté faktúry',p:'Čakáme na podklady za máj.'},{n:'ALFA Trade',m:'Zmluva o spolupráci',p:'Prioritný klient.'}]);shell(`<section class="grid metrics">${c.map(x=>`<div class="panel"><h2>${x.n}</h2><h3>Chýbajúce doklady</h3><p>${x.m||'Všetko kompletné'}</p><h3>Poznámky</h3><textarea class="field" onchange="x.p=this.value;save('clients',c)">${x.p}</textarea></div>`).join('')}</section>`)}function docs(){shell(`<section class="grid home">${['Zmluvy','Faktúry','DPH reporty','Mzdové podklady','Interné smernice','Archív klientov'].map(x=>`<div class="card"><b>□</b><h2>${x}</h2><p>Priestor pripravený na napojenie firemného úložiska.</p></div>`).join('')}</section>`)}
function ai(){let msgs=load('chat',[{r:'ai',t:'Dobrý deň, som AI asistent JOB & DUES. Obrázky sa generujú priamo v digitálnej tabuli v sekcii AI obrázok.'}]);shell(`<section class="panel"><h2>AI asistent</h2><div class="grid">${msgs.map(m=>`<div class="chat ${m.r}">${m.t}</div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 160px;margin-top:14px"><input id="q" class="field" placeholder="Napíšte otázku"><button class="action" onclick="msgs.push({r:'user',t:q.value},{r:'ai',t:'Demo odpoveď: pre obrázok choďte do Digitálnej tabule -> AI obrázok.'});save('chat',msgs);ai()">Odoslať</button></div></section>`)}function analytics(){let m=[['Tržby','128 400 €'],['Náklady','74 900 €'],['Zisk','53 500 €'],['DPH','16 240 €'],['Pohľadávky','31 800 €'],['Záväzky','22 600 €']];shell(`<section class="grid metrics">${m.map(x=>`<div class="panel metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</section>`)}render();
</script></body></html>
