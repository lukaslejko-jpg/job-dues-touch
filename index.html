<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JOB & DUES Touch</title>
<style>
:root{--gold:#ddbf82;--gold2:#c9a768;--bg:#07090d;--panel-w:300px;--panel-h:320px}*{box-sizing:border-box}html,body,#app{min-height:100%;margin:0}body{background:linear-gradient(145deg,#07090d,#101722 55%,#080a0f);color:#fff;font-family:Inter,Segoe UI,Arial,sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(7,9,13,.95);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;padding:6px 9px;text-align:left}.logoBox{position:relative;width:126px;height:58px;border-radius:8px;background:#fff;display:grid;place-items:center;overflow:hidden;flex:0 0 auto}.logoBox img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:3px;display:none}.logoFallback{width:100%;height:100%;display:block}.brand strong{display:block;font-size:20px}.brand span span{display:block;color:#cbd5e1;font-size:12px}.nav{display:flex;gap:7px;overflow:auto}.nav button,.action{min-height:42px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.07);color:#fff;padding:8px 11px;font-weight:850}.nav button.active,.nav button:hover,.action.active,.action:hover{background:var(--gold);color:#111}.status{text-align:right;color:#f7e5bd;font-weight:900;border:1px solid rgba(221,191,130,.28);border-radius:8px;padding:9px 11px;background:rgba(221,191,130,.1)}main{padding:16px}.grid{display:grid;gap:14px}.hero{min-height:190px;align-content:end;border:1px solid rgba(221,191,130,.22);border-radius:8px;background:linear-gradient(135deg,rgba(221,191,130,.2),rgba(255,255,255,.04),rgba(94,234,212,.08));padding:24px;margin-bottom:14px}.hero h1{margin:0;font-size:clamp(34px,5vw,70px)}.home,.metrics{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.card,.panel{border:1px solid rgba(255,255,255,.11);border-radius:8px;background:linear-gradient(150deg,rgba(23,34,49,.92),rgba(8,13,20,.96));padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.28)}.card{text-align:left;min-height:155px}.card b{display:grid;place-items:center;width:50px;height:50px;border:1px solid rgba(221,191,130,.35);border-radius:8px;background:rgba(221,191,130,.15);color:#f4d89d;font-size:22px}.field{width:100%;border:1px solid rgba(255,255,255,.13);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;padding:10px;outline:none}.list{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);padding:12px}.two{grid-template-columns:330px 1fr}.pill{min-height:34px;border:0;border-radius:8px;background:rgba(255,255,255,.08);color:#cbd5e1;font-weight:800}.pill.active{background:var(--gold);color:#111}.metric strong{display:block;font-size:32px;margin-top:7px}.board-layout{height:calc(100vh - 122px);display:grid;gap:10px;overflow:hidden;--panel-w-local:var(--panel-w);--panel-h-local:var(--panel-h)}.board-layout.side{grid-template-columns:var(--panel-w-local) minmax(0,1fr)}.board-layout.bottom{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) var(--panel-h-local)}.board-layout.collapsed.side{grid-template-columns:56px minmax(0,1fr)}.board-layout.collapsed.bottom{grid-template-rows:minmax(0,1fr) 56px}.board-layout.full{position:fixed;inset:0;z-index:80;height:100vh;background:#07090d;padding:10px}.tools{display:flex;flex-direction:column;overflow:hidden;width:var(--panel-w-local);height:100%;padding:8px}.bottom .tools{width:100%;height:var(--panel-h-local)}.collapsed .tools{width:56px;min-width:56px;padding:6px}.collapsed.bottom .tools{height:56px;width:100%}.tools-scroll{overflow:auto;display:grid;gap:8px;padding-right:2px}.bottom .tools-scroll{display:flex;overflow-x:auto;overflow-y:hidden}.collapsed .tools-scroll{display:flex;gap:6px;overflow:auto}.win{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.045);padding:0;min-width:0}.bottom .win{min-width:220px}.win summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:34px;padding:8px;color:#f4d89d;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:950;cursor:pointer}.win summary::-webkit-details-marker{display:none}.win summary:after{content:'−';color:#fff}.win:not([open]) summary:after{content:'+'}.win-body{padding:0 8px 8px;display:grid;gap:8px}.collapsed .win{display:none}.iconbar{display:none}.collapsed .iconbar{display:flex;gap:6px;flex-wrap:wrap}.collapsed.bottom .iconbar{flex-wrap:nowrap}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.mini.two{grid-template-columns:repeat(2,1fr)}.tools .action{min-height:34px;font-size:12px;padding:6px 7px}.icon{width:34px;min-width:34px;height:34px;min-height:34px;padding:0}.range{display:grid;gap:5px;color:#cbd5e1;font-size:12px}.range input{width:100%}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.swatch{min-height:26px;border-radius:8px;border:2px solid rgba(255,255,255,.18)}.swatch.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(221,191,130,.25)}.canvas-wrap{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#fff}.canvas-wrap.gridbg{background-image:linear-gradient(rgba(221,191,130,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(221,191,130,.18) 1px,transparent 1px);background-size:40px 40px}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:6}.selecting canvas{pointer-events:none}.obj{position:absolute;z-index:3;border:3px solid transparent;border-radius:8px;touch-action:none;cursor:move;resize:both;overflow:auto}.obj.img{object-fit:contain;background:#fff}.obj.note{padding:10px;background:#fff7c2;color:#111;font-weight:800;white-space:pre-wrap}.obj.text{padding:10px;background:rgba(255,255,255,.88);color:#111;font-weight:800;white-space:pre-wrap}.activeObj{border-color:var(--gold);box-shadow:0 0 0 4px rgba(221,191,130,.25)}.noteSmall{color:#cbd5e1;font-size:12px;line-height:1.35}.chat{max-width:82%;padding:12px 14px;border-radius:8px;line-height:1.4}.chat.ai{background:rgba(255,255,255,.08)}.chat.user{justify-self:end;background:var(--gold);color:#111;font-weight:800}@media(max-width:900px){.top{grid-template-columns:1fr}.status{text-align:left}.two{grid-template-columns:1fr}.brand{width:100%;justify-content:flex-start}.logoBox{width:118px;height:54px}.board-layout{height:calc(100vh - 198px)}.board-layout.side{grid-template-columns:minmax(56px,min(45vw,var(--panel-w-local))) minmax(0,1fr)}.board-layout.bottom{grid-template-rows:minmax(0,1fr) var(--panel-h-local)}.board-layout.collapsed.side{grid-template-columns:56px minmax(0,1fr)}.tools{width:100%;min-width:0}.bottom .tools-scroll{display:flex}.bottom .win{min-width:205px}.nav button{white-space:nowrap}}
</style>
</head>
<body><div id="app"></div>
<script>
const $=s=>document.querySelector(s),qs=s=>[...document.querySelectorAll(s)],store=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}},uid=()=>Date.now()+Math.random().toString(16).slice(2);
let state=load('jd-state',{view:'home',tool:'pen',color:'#2b2b2d',size:8,bg:'#fff',panel:'side',collapsed:false,full:false,grid:false,panelW:300,panelH:320});
let objects=load('jd-board-objects',[]),boardData=load('jd-board-canvas',''),selected=null,items={ann:load('ann',[{t:'Týždenná porada',b:'Pondelok 09:00 v zasadacej miestnosti.'}]),tasks:load('tasks',[{t:'Pripraviť mesačné výkazy',s:'rieši sa'}]),clients:load('clients',[{n:'NOVA s.r.o.',m:'Bankové výpisy, prijaté faktúry',p:'Čakáme na podklady za máj.'},{n:'ALFA Trade',m:'Zmluva o spolupráci',p:'Prioritný klient.'}]),chat:load('chat',[{r:'ai',t:'Dobrý deň, som AI asistent JOB & DUES. Obrázky generujte v digitálnej tabuli v okne AI obrázok.'}])};
const modules=[['home','⌂','Domov'],['board','✎','Digitálna tabuľa'],['ann','!','Oznamy'],['tasks','✓','Úlohy'],['clients','▦','Klienti'],['docs','□','Dokumenty'],['ai','AI','AI'],['analytics','▥','Analýzy']];
function persist(){store('jd-state',state);store('jd-board-objects',objects);store('jd-board-canvas',boardData)}function capture(){let c=$('#cv');if(c&&c.width)boardData=c.toDataURL();persist()}function go(v){capture();state.view=v;render()}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function logo(){return `<div class="logoBox"><img src="assets/logo-job-dues.svg?v=20260602b" alt="JOB & DUES" onload="this.style.display='block';this.nextElementSibling.style.display='none'"><svg class="logoFallback" viewBox="0 0 886 738" aria-label="JOB & DUES"><rect width="886" height="738" fill="#fff"/><g fill="#ddbf82"><path d="M332 0h222v706H332V184h134v16h-58v492h160c82 0 138-60 138-148V330c0-64-30-110-92-136v-7c75 18 128 80 128 161v204c0 122-84 186-198 186H332z"/><path d="M184 331 260 258v289c-74-20-124-80-124-151 0-35 14-67 48-95z"/></g><text x="8" y="438" fill="#2b2b2d" font-family="Segoe Script, Brush Script MT, cursive" font-size="128" font-style="italic" transform="rotate(-7 8 438)">Job &amp; Dues</text></svg></div>`}
function shell(content){persist();$('#app').innerHTML=`<header class="top"><button class="brand" onclick="go('home')">${logo()}<span><strong>JOB & DUES</strong><span>firemný dotykový panel</span></span></button><nav class="nav">${modules.map(m=>`<button class="${state.view==m[0]?'active':''}" onclick="go('${m[0]}')">${m[1]} ${m[2]}</button>`).join('')}</nav><div class="status">Dotykový režim</div></header><main>${content}</main>`}
function home(){shell(`<section class="hero"><div>JOB & DUES</div><h1>Dotykový firemný panel</h1><p>Digitálna tabuľa, oznamy, úlohy, klienti, dokumenty, AI a analýzy.</p></section><section class="grid home">${modules.filter(m=>m[0]!='home').map(m=>`<button class="card" onclick="go('${m[0]}')"><b>${m[1]}</b><h2>${m[2]}</h2><p>Otvoriť modul</p></button>`).join('')}</section>`)}
function win(t,b,open=true){return `<details class="win" ${open?'open':''}><summary>${t}</summary><div class="win-body">${b}</div></details>`}
function board(){let cls=`board-layout ${state.panel} ${state.collapsed?'collapsed':''} ${state.full?'full':''}`;shell(`<section id="layout" class="${cls}" style="--panel-w-local:${state.panelW}px;--panel-h-local:${state.panelH}px"><aside class="panel tools"><div class="iconbar"><button class="action icon" title="Rozbaliť" onclick="state.collapsed=false;capture();board()">☰</button>${[['pen','✎'],['eraser','⌫'],['select','↕'],['line','/'],['rect','□']].map(x=>`<button class="action icon ${state.tool==x[0]?'active':''}" onclick="setTool('${x[0]}')">${x[1]}</button>`).join('')}<button class="action icon" title="${state.panel=='side'?'Dole':'Bok'}" onclick="state.panel=state.panel=='side'?'bottom':'side';capture();board()">${state.panel=='side'?'↧':'↦'}</button></div><div class="tools-scroll">${win('Panel',`<div class="mini"><button class="action" onclick="state.collapsed=!state.collapsed;capture();board()">☰</button><button class="action" onclick="state.panel=state.panel=='side'?'bottom':'side';capture();board()">${state.panel=='side'?'Dole':'Bok'}</button><button class="action" onclick="state.full=!state.full;capture();board()">${state.full?'Okno':'Full'}</button></div><button class="action" onclick="state.grid=!state.grid;capture();board()">Mriežka</button><label class="range">Šírka: <b id="pw">${state.panelW}px</b><input type="range" min="180" max="560" step="10" value="${state.panelW}" oninput="state.panelW=+this.value;applyPanel()"></label><label class="range">Výška: <b id="ph">${state.panelH}px</b><input type="range" min="120" max="720" step="10" value="${state.panelH}" oninput="state.panelH=+this.value;applyPanel()"></label><div class="mini two"><button class="action" onclick="state.panelH=Math.max(120,state.panelH-20);applyPanel()">H-</button><button class="action" onclick="state.panelH=Math.min(720,state.panelH+20);applyPanel()">H+</button></div>`)}${win('Nástroje',`<div class="mini">${[['pen','✎'],['high','▰'],['eraser','⌫'],['line','/'],['rect','□'],['select','↕'],['clear','×']].map(x=>`<button class="action ${state.tool==x[0]?'active':''}" onclick="setTool('${x[0]}')">${x[1]}</button>`).join('')}</div>`)}${win('Farba',`<div class="swatches">${['#2b2b2d','#0d0d0d','#ddbf82','#c9a768','#fff','#ef4444','#22c55e','#3b82f6','#f59e0b','#a855f7'].map(c=>`<button class="swatch ${state.color==c?'active':''}" style="background:${c}" onclick="state.color='${c}';state.tool='pen';capture();board()"></button>`).join('')}</div><input class="field" type="color" value="${state.color}" onchange="state.color=this.value;persist()">`)}${win('Čiara / pozadie',`<label class="range">Hrúbka ${state.size}<input type="range" min="2" max="40" value="${state.size}" oninput="state.size=this.value;capture();board()"></label><input class="field" type="color" value="${state.bg}" onchange="state.bg=this.value;capture();board()">`)}${win('AI obrázok',`<textarea id="imgPrompt" class="field" rows="3" placeholder="Napr. moderná kancelária JOB & DUES"></textarea><button class="action" onclick="createAiImage()">Vytvoriť obrázok</button><button class="action" onclick="objects=objects.filter(o=>o.type!='ai-image');capture();board()">Vymazať AI obrázky</button><p class="noteSmall">Demo Pollinations bez API kľúča.</p>`,false)}${win('Text / sticky',`<textarea id="txt" class="field" rows="3" placeholder="Text alebo poznámka"></textarea><div class="mini two"><button class="action" onclick="addText('text')">Text</button><button class="action" onclick="addText('note')">Sticky</button></div>`,false)}${win('Import / projekt',`<input id="fileIn" type="file" accept="image/*" multiple hidden onchange="importImages(this.files)"><input id="projIn" type="file" accept="application/json,.json" hidden onchange="loadProject(this.files[0])"><button class="action" onclick="fileIn.click()">Import obrázkov</button><button class="action" onclick="saveProject()">Uložiť projekt</button><button class="action" onclick="projIn.click()">Načítať projekt</button>`,false)}${win('Export',`<div class="mini two"><button class="action" onclick="downloadBoard()">Obrázok</button><button class="action" onclick="clearBoard()">Vymazať</button></div>`,false)}</div></aside><div id="wrap" class="canvas-wrap ${state.grid?'gridbg':''} ${state.tool=='select'?'selecting':''}" style="background-color:${state.bg}">${objects.map(renderObj).join('')}<canvas id="cv"></canvas></div></section>`);applyPanel();setupCanvas();setupObjects()}
function applyPanel(){let l=$('#layout');if(l){l.style.setProperty('--panel-w-local',state.panelW+'px');l.style.setProperty('--panel-h-local',state.panelH+'px')}let pw=$('#pw'),ph=$('#ph');if(pw)pw.textContent=state.panelW+'px';if(ph)ph.textContent=state.panelH+'px';persist()}
function renderObj(o){if(o.kind=='note'||o.kind=='text')return `<div contenteditable class="obj ${o.kind} ${selected==o.id?'activeObj':''}" data-id="${o.id}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;min-height:${o.h}px">${esc(o.text)}</div>`;return `<img class="obj img ${selected==o.id?'activeObj':''}" data-id="${o.id}" src="${o.src}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px">`}
function setTool(t){capture();if(t=='clear')return clearCanvasOnly();state.tool=t;persist();board()}function clearCanvasOnly(){let c=$('#cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);boardData='';persist()}
function clearBoard(){if(confirm('Vymazať celú tabuľu?')){objects=[];boardData='';persist();board()}}function addText(kind){capture();let text=($('#txt')?.value||'Poznámka').trim();objects.push({id:uid(),kind,type:kind,text,x:90,y:90,w:240,h:90});selected=objects.at(-1).id;persist();board()}
function createAiImage(){capture();let prompt=($('#imgPrompt')?.value||'JOB & DUES modern corporate image').trim();objects.push({id:uid(),type:'ai-image',src:'https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt+' clean corporate dark gold')+'?width=900&height=600&nologo=true&seed='+Date.now(),x:80,y:80,w:340,h:230});selected=objects.at(-1).id;persist();board()}
function importImages(files){capture();[...files].forEach(f=>{let r=new FileReader();r.onload=()=>{objects.push({id:uid(),type:'image',src:r.result,x:80,y:80,w:320,h:220});persist();board()};r.readAsDataURL(f)})}
function setupObjects(){qs('.obj').forEach(el=>{let id=el.dataset.id,o=objects.find(x=>x.id==id),drag=null;el.oninput=()=>{if(o.kind){o.text=el.innerText;persist()}};el.onpointerdown=e=>{if(state.tool!='select')return;selected=id;drag={x:e.clientX-o.x,y:e.clientY-o.y,w:o.w,h:o.h};el.setPointerCapture(e.pointerId);el.classList.add('activeObj')};el.onpointermove=e=>{if(!drag)return;o.x=e.clientX-drag.x;o.y=e.clientY-drag.y;el.style.left=o.x+'px';el.style.top=o.y+'px';o.w=el.offsetWidth;o.h=el.offsetHeight;persist()};el.onpointerup=()=>{if(o){o.w=el.offsetWidth;o.h=el.offsetHeight;persist()}drag=null}})}
function setupCanvas(){let c=$('#cv'),w=$('#wrap'),ctx=c.getContext('2d'),drawing=false,last=null,snap=null;function resize(){let r=w.getBoundingClientRect(),old=boardData;c.width=Math.max(1,r.width*devicePixelRatio);c.height=Math.max(1,r.height*devicePixelRatio);ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(old){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old}}new ResizeObserver(resize).observe(w);setTimeout(resize,60);function p(e){let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){if(state.tool=='select')return;e.preventDefault();drawing=true;last=p(e);snap=ctx.getImageData(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round'}function move(e){if(!drawing)return;e.preventDefault();let q=p(e);ctx.strokeStyle=state.tool=='eraser'?state.bg:state.tool=='high'?'rgba(221,191,130,.35)':state.color;ctx.lineWidth=state.tool=='high'?state.size*2:state.size;if(['line','rect'].includes(state.tool)){ctx.putImageData(snap,0,0);ctx.beginPath();if(state.tool=='line'){ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y)}else ctx.rect(last.x,last.y,q.x-last.x,q.y-last.y);ctx.stroke();return}ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q}function stop(){if(drawing){drawing=false;capture()}}['mousedown','touchstart'].forEach(e=>c.addEventListener(e,start,{passive:false}));['mousemove','touchmove'].forEach(e=>c.addEventListener(e,move,{passive:false}));['mouseup','mouseleave','touchend'].forEach(e=>c.addEventListener(e,stop))}
function downloadBoard(){capture();let c=$('#cv'),a=document.createElement('a');a.download='job-dues-tabula.png';a.href=c.toDataURL();a.click()}function saveProject(){capture();let a=document.createElement('a');a.download='job-dues-projekt.json';a.href=URL.createObjectURL(new Blob([JSON.stringify({state,objects,boardData},null,2)],{type:'application/json'}));a.click()}function loadProject(file){let r=new FileReader();r.onload=()=>{let p=JSON.parse(r.result);state=p.state||state;objects=p.objects||[];boardData=p.boardData||'';persist();board()};r.readAsText(file)}
function ann(){shell(`<section class="two grid"><div class="panel"><h2>Nový oznam</h2><input id="at" class="field" placeholder="Nadpis"><textarea id="ab" class="field" placeholder="Text"></textarea><button class="action" onclick="items.ann.unshift({t:at.value,b:ab.value});store('ann',items.ann);ann()">Pridať</button></div><div class="grid">${items.ann.map(i=>`<article class="list"><h2>${esc(i.t)}</h2><p>${esc(i.b)}</p></article>`).join('')}</div></section>`)}
function tasks(){let sts=['nové','rieši sa','hotové'];shell(`<section class="two grid"><div class="panel"><h2>Nová úloha</h2><input id="nt" class="field"><button class="action" onclick="items.tasks.unshift({t:nt.value,s:'nové'});store('tasks',items.tasks);tasks()">Pridať</button></div><div class="grid metrics">${sts.map(s=>`<div class="panel"><h2>${s}</h2>${items.tasks.filter(x=>x.s==s).map(x=>`<div class="list"><p>${esc(x.t)}</p>${sts.map(n=>`<button class="pill ${x.s==n?'active':''}" onclick="items.tasks[${items.tasks.indexOf(x)}].s='${n}';store('tasks',items.tasks);tasks()">${n}</button>`).join('')}</div>`).join('')}</div>`).join('')}</div></section>`)}
function clients(){shell(`<section class="grid metrics">${items.clients.map((x,i)=>`<div class="panel"><h2>${esc(x.n)}</h2><h3>Chýbajúce doklady</h3><textarea class="field" onchange="items.clients[${i}].m=this.value;store('clients',items.clients)">${esc(x.m)}</textarea><h3>Poznámky</h3><textarea class="field" onchange="items.clients[${i}].p=this.value;store('clients',items.clients)">${esc(x.p)}</textarea></div>`).join('')}</section>`)}
function docs(){shell(`<section class="grid home">${['Zmluvy','Faktúry','DPH reporty','Mzdové podklady','Interné smernice','Archív klientov'].map(x=>`<div class="card"><b>□</b><h2>${x}</h2><p>Priestor pripravený na napojenie firemného úložiska.</p></div>`).join('')}</section>`)}
function ai(){shell(`<section class="panel"><h2>AI asistent</h2><div class="grid">${items.chat.map(m=>`<div class="chat ${m.r}">${esc(m.t)}</div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 150px;margin-top:14px"><input id="q" class="field" placeholder="Napíšte otázku"><button class="action" onclick="items.chat.push({r:'user',t:q.value},{r:'ai',t:'Demo odpoveď: API sa dá napojiť neskôr. AI obrázok je v digitálnej tabuli.'});store('chat',items.chat);ai()">Odoslať</button></div></section>`)}
function analytics(){let m=[['Tržby','128 400 €'],['Náklady','74 900 €'],['Zisk','53 500 €'],['DPH','16 240 €'],['Pohľadávky','31 800 €'],['Záväzky','22 600 €']];shell(`<section class="grid metrics">${m.map(x=>`<div class="panel metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</section>`)}
function render(){({home,board,ann,tasks,clients,docs,ai,analytics}[state.view]||home)()}render();
</script></body></html>
