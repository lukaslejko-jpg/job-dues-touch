<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JOB & DUES Touch</title>
<style>
:root{--gold:#ddbf82;--dark:#07090d;--panel-w:300px;--panel-h:300px}*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{background:#07090d;color:#fff;font-family:Inter,Segoe UI,Arial,sans-serif;overflow:hidden}button,input,textarea{font:inherit}button{cursor:pointer}.top{height:auto;min-height:96px;display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(7,9,13,.97)}.brand{display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;padding:6px 8px;text-align:left}.logoBox{width:110px;height:50px;border-radius:8px;background:#fff;display:grid;place-items:center;overflow:hidden;flex:0 0 auto}.logoText{display:grid;place-items:center;width:100%;height:100%;color:#2b2b2d;font-family:Georgia,serif;font-weight:900;line-height:1;text-align:center}.logoText b{font-size:21px;color:#c9a768}.logoText span{font-size:13px;font-style:italic}.brand strong{display:block;font-size:18px}.brand span span{display:block;color:#cbd5e1;font-size:12px}.nav{grid-column:1/-1;display:flex;gap:6px;overflow:auto;padding-bottom:2px}.nav button,.action{min-height:38px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.07);color:#fff;padding:7px 9px;font-weight:850}.nav button.active,.nav button:hover,.action.active,.action:hover{background:var(--gold);color:#111}main{height:calc(100dvh - 96px);overflow:auto;padding:10px}.grid{display:grid;gap:12px}.hero{min-height:155px;align-content:end;border:1px solid rgba(221,191,130,.22);border-radius:8px;background:linear-gradient(135deg,rgba(221,191,130,.2),rgba(255,255,255,.04),rgba(94,234,212,.08));padding:18px;margin-bottom:12px}.hero h1{margin:0;font-size:clamp(30px,7vw,60px)}.home,.metrics{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}.card,.panel{border:1px solid rgba(255,255,255,.11);border-radius:8px;background:linear-gradient(150deg,rgba(23,34,49,.92),rgba(8,13,20,.96));padding:14px;box-shadow:0 24px 80px rgba(0,0,0,.28)}.card{text-align:left;min-height:130px}.card b{display:grid;place-items:center;width:46px;height:46px;border:1px solid rgba(221,191,130,.35);border-radius:8px;background:rgba(221,191,130,.15);color:#f4d89d;font-size:18px}.field{width:100%;border:1px solid rgba(255,255,255,.13);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;padding:10px;outline:none}.list{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);padding:12px}.two{grid-template-columns:1fr}.pill{min-height:34px;border:0;border-radius:8px;background:rgba(255,255,255,.08);color:#cbd5e1;font-weight:800}.pill.active{background:var(--gold);color:#111}.metric strong{display:block;font-size:30px;margin-top:6px}
.board-page{padding:0;overflow:hidden}.board-layout{height:calc(100dvh - 96px);display:grid;gap:8px;overflow:hidden;--panel-w-local:var(--panel-w);--panel-h-local:var(--panel-h)}.board-layout.side{grid-template-columns:var(--panel-w-local) minmax(0,1fr)}.board-layout.bottom{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) var(--panel-h-local)}.side>.tools{grid-column:1;grid-row:1}.side>.canvas-wrap{grid-column:2;grid-row:1}.bottom>.canvas-wrap{grid-column:1;grid-row:1}.bottom>.tools{grid-column:1;grid-row:2}.board-layout.collapsed.side{grid-template-columns:62px minmax(0,1fr)}.board-layout.collapsed.bottom{grid-template-rows:minmax(0,1fr) 62px}.board-layout.collapsed.bottom.icons2{grid-template-rows:minmax(0,1fr) 104px}.board-layout.full{position:fixed;inset:0;z-index:80;height:100dvh;background:#07090d;padding:8px}.tools{display:flex;flex-direction:column;overflow:hidden;width:var(--panel-w-local);height:100%;padding:7px}.bottom .tools{width:100%;height:var(--panel-h-local)}.collapsed .tools{width:62px;min-width:62px;padding:6px;overflow:auto}.collapsed.bottom .tools{height:62px;width:100%;overflow-x:auto;overflow-y:hidden}.collapsed.bottom.icons2 .tools{height:104px}.tools-scroll{overflow:auto;display:grid;gap:8px;padding-right:2px}.bottom .tools-scroll{display:flex;overflow-x:auto;overflow-y:hidden}.collapsed .tools-scroll{display:block;height:0;min-height:0;overflow:hidden;padding:0}.win{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.045);padding:0;min-width:0}.bottom .win{min-width:214px}.win summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:34px;padding:8px;color:#f4d89d;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:950;cursor:pointer}.win summary::-webkit-details-marker{display:none}.win summary:after{content:'-';color:#fff}.win:not([open]) summary:after{content:'+'}.win-body{padding:0 8px 8px;display:grid;gap:8px}.collapsed .win{display:none}.iconbar{display:none}.collapsed .iconbar{display:grid;grid-template-columns:1fr;gap:6px;align-content:start;overflow:visible}.collapsed.bottom .iconbar{display:flex;gap:6px;flex-wrap:nowrap;width:max-content;min-width:max-content}.collapsed.bottom.icons2 .iconbar{display:grid;grid-auto-flow:column;grid-template-rows:repeat(2,40px);grid-auto-columns:40px;gap:6px;width:max-content;min-width:max-content}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.mini.two{grid-template-columns:repeat(2,1fr)}.tools .action{min-height:34px;font-size:12px;padding:6px 7px}.icon{width:40px;min-width:40px;height:40px;min-height:40px;padding:0;font-size:17px}.range{display:grid;gap:5px;color:#cbd5e1;font-size:12px}.range input{width:100%}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.swatch{min-height:30px;border-radius:8px;border:2px solid rgba(255,255,255,.18)}.swatch.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(221,191,130,.25)}.canvas-wrap{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#fff;min-height:0}.canvas-wrap.gridbg{background-image:linear-gradient(rgba(221,191,130,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(221,191,130,.18) 1px,transparent 1px);background-size:40px 40px}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:6}.selecting canvas{pointer-events:none}.obj{position:absolute;z-index:3;border:3px solid transparent;border-radius:8px;touch-action:none;cursor:move;resize:both;overflow:auto}.obj.img{object-fit:contain;background:#fff}.obj.note{padding:10px;background:#fff7c2;color:#111;font-weight:800;white-space:pre-wrap}.obj.text{padding:10px;background:rgba(255,255,255,.88);color:#111;font-weight:800;white-space:pre-wrap}.activeObj{border-color:var(--gold);box-shadow:0 0 0 4px rgba(221,191,130,.25)}.noteSmall{color:#cbd5e1;font-size:12px;line-height:1.35}.chat{max-width:82%;padding:12px 14px;border-radius:8px;line-height:1.4}.chat.ai{background:rgba(255,255,255,.08)}.chat.user{justify-self:end;background:var(--gold);color:#111;font-weight:800}@media(max-width:900px){.board-layout.side{grid-template-columns:62px minmax(0,1fr)}.board-layout.side:not(.collapsed){grid-template-columns:minmax(190px,min(55vw,var(--panel-w-local))) minmax(0,1fr)}.board-layout.collapsed.side{grid-template-columns:62px minmax(0,1fr)}.tools{width:100%;min-width:0}.brand{width:100%}.nav button{white-space:nowrap}}
</style>
</head>
<body><div id="app"></div>
<script>
const $=s=>document.querySelector(s),qs=s=>[...document.querySelectorAll(s)],store=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}},uid=()=>Date.now()+Math.random().toString(16).slice(2);
let state=load('jd-state',{view:'home',tool:'pen',color:'#2b2b2d',size:8,bg:'#fff',panel:'side',collapsed:false,full:false,grid:false,panelW:300,panelH:300,iconRows:1});state.iconRows=state.iconRows||1;
let objects=load('jd-board-objects',[]),boardData=load('jd-board-canvas',''),selected=null,items={ann:load('ann',[{t:'Týždenná porada',b:'Pondelok 09:00 v zasadacej miestnosti.'}]),tasks:load('tasks',[{t:'Pripraviť mesačné výkazy',s:'rieši sa'}]),clients:load('clients',[{n:'NOVA s.r.o.',m:'Bankové výpisy, prijaté faktúry',p:'Čakáme na podklady za máj.'},{n:'ALFA Trade',m:'Zmluva o spolupráci',p:'Prioritný klient.'}]),chat:load('chat',[{r:'ai',t:'Dobrý deň, som AI asistent JOB & DUES. Obrázky generujte v digitálnej tabuli v okne AI obrázok.'}])};
const modules=[['home','Domov','Domov'],['board','Tabuľa','Digitálna tabuľa'],['ann','Oznamy','Oznamy'],['tasks','Úlohy','Úlohy'],['clients','Klienti','Klienti'],['docs','Dok','Dokumenty'],['ai','AI','AI'],['analytics','Dáta','Analýzy']];
const tools=[['pen','✎','Pero'],['eraser','⌫','Guma'],['high','▰','Zvýrazňovač'],['line','╱','Čiara'],['rect','□','Obdĺžnik'],['select','↕','Presun'],['clear','×','Vymazať kresbu']];
const bgColors=['#ffffff','#f8fafc','#fef3c7','#ddbf82','#c9a768','#0f172a','#111827','#e0f2fe','#dcfce7','#fee2e2'];
function persist(){store('jd-state',state);store('jd-board-objects',objects);store('jd-board-canvas',boardData)}function capture(){let c=$('#cv');if(c&&c.width)boardData=c.toDataURL();persist()}function go(v){capture();state.view=v;render()}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function setBg(v){if(!/^#[0-9a-fA-F]{6}$/.test(v))return;state.bg=v;let w=$('#wrap');if(w)w.style.backgroundColor=v;let hx=$('#bgHex');if(hx&&hx.value!==v)hx.value=v;persist()}
function togglePanel(){state.panel=state.panel==='side'?'bottom':'side';state.collapsed=true;persist();board()}
function logo(){return `<div class="logoBox"><div class="logoText"><b>JD</b><span>Job &amp; Dues</span></div></div>`}
function shell(content,bodyClass=''){persist();document.body.className=bodyClass;$('#app').innerHTML=`<header class="top"><button class="brand" onclick="go('home')">${logo()}<span><strong>JOB & DUES</strong><span>firemný dotykový panel</span></span></button><nav class="nav">${modules.map(m=>`<button class="${state.view==m[0]?'active':''}" onclick="go('${m[0]}')">${m[1]}</button>`).join('')}</nav></header><main>${content}</main>`}
function home(){shell(`<section class="hero"><div>JOB & DUES</div><h1>Dotykový firemný panel</h1><p>Digitálna tabuľa, oznamy, úlohy, klienti, dokumenty, AI a analýzy.</p></section><section class="grid home">${modules.filter(m=>m[0]!='home').map(m=>`<button class="card" onclick="go('${m[0]}')"><b>${m[1]}</b><h2>${m[2]}</h2><p>Otvoriť modul</p></button>`).join('')}</section>`)}
function win(t,b,open=true){return `<details class="win" ${open?'open':''}><summary>${t}</summary><div class="win-body">${b}</div></details>`}
function iconbar(){return `<div class="iconbar"><button class="action icon" title="Rozbaliť panel" onclick="state.collapsed=false;persist();board()">☰</button>${tools.map(x=>`<button class="action icon ${state.tool==x[0]?'active':''}" title="${x[2]}" onclick="setTool('${x[0]}')">${x[1]}</button>`).join('')}<button class="action icon" title="Mriežka" onclick="state.grid=!state.grid;persist();board()">#</button><button class="action icon" title="1 alebo 2 rady" onclick="state.iconRows=state.iconRows==2?1:2;persist();board()">${state.iconRows==2?'1R':'2R'}</button><button class="action icon" title="AI obrázok" onclick="createAiImage()">AI</button><button class="action icon" title="Text" onclick="addText('text')">T</button><button class="action icon" title="Sticky" onclick="addText('note')">N</button><button class="action icon" title="Import" onclick="fileIn.click()">⇪</button><button class="action icon" title="Uložiť" onclick="saveProject()">S</button><button class="action icon" title="Export" onclick="downloadBoard()">⇩</button><button class="action icon" title="${state.panel=='side'?'Panel dole':'Panel bok'}" onclick="togglePanel()">${state.panel=='side'?'⇩':'⇨'}</button></div>`}
function board(){let cls=`board-layout ${state.panel} ${state.collapsed?'collapsed':''} ${state.full?'full':''} ${state.iconRows==2?'icons2':''}`;shell(`<section id="layout" class="${cls}" style="--panel-w-local:${state.panelW}px;--panel-h-local:${state.panelH}px"><aside class="panel tools"><input id="fileIn" type="file" accept="image/*" multiple hidden onchange="importImages(this.files)"><input id="projIn" type="file" accept="application/json,.json" hidden onchange="loadProject(this.files[0])">${iconbar()}<div class="tools-scroll">${win('Panel',`<div class="mini"><button class="action" onclick="state.collapsed=!state.collapsed;persist();board()">☰</button><button class="action" onclick="togglePanel()">${state.panel=='side'?'Dole ⇩':'Bok ⇨'}</button><button class="action" onclick="state.full=!state.full;persist();board()">${state.full?'Okno':'Full'}</button></div><div class="mini two"><button class="action" onclick="state.grid=!state.grid;persist();board()">Mriežka</button><button class="action" onclick="state.iconRows=state.iconRows==2?1:2;persist();board()">Ikony ${state.iconRows==2?'1 rad':'2 rady'}</button></div><label class="range">Šírka: <b id="pw">${state.panelW}px</b><input type="range" min="190" max="560" step="10" value="${state.panelW}" oninput="state.panelW=+this.value;applyPanel()"></label><label class="range">Výška: <b id="ph">${state.panelH}px</b><input type="range" min="130" max="640" step="10" value="${state.panelH}" oninput="state.panelH=+this.value;applyPanel()"></label>`)}${win('Nástroje',`<div class="mini">${tools.map(x=>`<button class="action ${state.tool==x[0]?'active':''}" onclick="setTool('${x[0]}')">${x[1]} ${x[2]}</button>`).join('')}</div>`)}${win('Farba pera',`<div class="swatches">${['#2b2b2d','#0d0d0d','#ddbf82','#c9a768','#fff','#ef4444','#22c55e','#3b82f6','#f59e0b','#a855f7'].map(c=>`<button class="swatch ${state.color==c?'active':''}" style="background:${c}" onclick="state.color='${c}';state.tool='pen';persist();board()"></button>`).join('')}</div><input class="field" type="color" value="${state.color}" onchange="state.color=this.value;persist()">`)}${win('Čiara / pozadie',`<label class="range">Hrúbka ${state.size}<input type="range" min="2" max="40" value="${state.size}" oninput="state.size=this.value;capture();board()"></label><div class="swatches">${bgColors.map(c=>`<button class="swatch ${state.bg==c?'active':''}" style="background:${c}" onclick="setBg('${c}')"></button>`).join('')}</div><input id="bgHex" class="field" value="${state.bg}" placeholder="#ffffff" inputmode="text" oninput="setBg(this.value)"><input class="field" type="color" value="${state.bg}" onchange="setBg(this.value)">`)}${win('AI obrázok',`<textarea id="imgPrompt" class="field" rows="3" placeholder="Napr. moderná kancelária JOB & DUES"></textarea><button class="action" onclick="createAiImage()">Vytvoriť obrázok</button><button class="action" onclick="objects=objects.filter(o=>o.type!='ai-image');capture();board()">Vymazať AI obrázky</button><p class="noteSmall">Demo Pollinations bez API kľúča.</p>`,false)}${win('Text / sticky',`<textarea id="txt" class="field" rows="3" placeholder="Text alebo poznámka"></textarea><div class="mini two"><button class="action" onclick="addText('text')">Text</button><button class="action" onclick="addText('note')">Sticky</button></div>`,false)}${win('Import / projekt',`<button class="action" onclick="fileIn.click()">Import obrázkov</button><button class="action" onclick="saveProject()">Uložiť projekt</button><button class="action" onclick="projIn.click()">Načítať projekt</button>`,false)}${win('Export',`<div class="mini two"><button class="action" onclick="downloadBoard()">Obrázok</button><button class="action" onclick="clearBoard()">Vymazať</button></div>`,false)}</div></aside><div id="wrap" class="canvas-wrap ${state.grid?'gridbg':''} ${state.tool=='select'?'selecting':''}" style="background-color:${state.bg}">${objects.map(renderObj).join('')}<canvas id="cv"></canvas></div></section>`,'board-page');applyPanel();setupCanvas();setupObjects()}
function applyPanel(){let l=$('#layout');if(l){l.style.setProperty('--panel-w-local',state.panelW+'px');l.style.setProperty('--panel-h-local',state.panelH+'px')}let pw=$('#pw'),ph=$('#ph');if(pw)pw.textContent=state.panelW+'px';if(ph)ph.textContent=state.panelH+'px';persist()}
function renderObj(o){if(o.kind=='note'||o.kind=='text')return `<div contenteditable class="obj ${o.kind} ${selected==o.id?'activeObj':''}" data-id="${o.id}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;min-height:${o.h}px">${esc(o.text)}</div>`;return `<img class="obj img ${selected==o.id?'activeObj':''}" data-id="${o.id}" src="${o.src}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px">`}
function setTool(t){capture();if(t=='clear')return clearCanvasOnly();state.tool=t;persist();board()}function clearCanvasOnly(){let c=$('#cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);boardData='';persist()}
function clearBoard(){if(confirm('Vymazať celú tabuľu?')){objects=[];boardData='';persist();board()}}function addText(kind){capture();let text=($('#txt')?.value||'Poznámka').trim();objects.push({id:uid(),kind,type:kind,text,x:90,y:90,w:240,h:90});selected=objects.at(-1).id;persist();board()}
function createAiImage(){capture();let prompt=($('#imgPrompt')?.value||'JOB & DUES modern corporate image').trim();objects.push({id:uid(),type:'ai-image',src:'https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt+' clean corporate dark gold')+'?width=900&height=600&nologo=true&seed='+Date.now(),x:80,y:80,w:340,h:230});selected=objects.at(-1).id;persist();board()}
function importImages(files){capture();[...files].forEach(f=>{let r=new FileReader();r.onload=()=>{objects.push({id:uid(),type:'image',src:r.result,x:80,y:80,w:320,h:220});persist();board()};r.readAsDataURL(f)})}
function setupObjects(){qs('.obj').forEach(el=>{let id=el.dataset.id,o=objects.find(x=>x.id==id),drag=null;el.oninput=()=>{if(o.kind){o.text=el.innerText;persist()}};el.onpointerdown=e=>{if(state.tool!='select')return;selected=id;drag={x:e.clientX-o.x,y:e.clientY-o.y,w:o.w,h:o.h};el.setPointerCapture(e.pointerId);el.classList.add('activeObj')};el.onpointermove=e=>{if(!drag)return;o.x=e.clientX-drag.x;o.y=e.clientY-drag.y;el.style.left=o.x+'px';el.style.top=o.y+'px';o.w=el.offsetWidth;o.h=el.offsetHeight;persist()};el.onpointerup=()=>{if(o){o.w=el.offsetWidth;o.h=el.offsetHeight;persist()}drag=null}})}
function setupCanvas(){let c=$('#cv'),w=$('#wrap'),ctx=c.getContext('2d'),drawing=false,last=null,snap=null;function resize(){let r=w.getBoundingClientRect(),old=boardData;c.width=Math.max(1,r.width*devicePixelRatio);c.height=Math.max(1,r.height*devicePixelRatio);ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(old){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old}}new ResizeObserver(resize).observe(w);setTimeout(resize,60);function p(e){let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){if(state.tool=='select')return;e.preventDefault();drawing=true;last=p(e);snap=ctx.getImageData(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round'}function move(e){if(!drawing)return;e.preventDefault();let q=p(e);ctx.strokeStyle=state.tool=='eraser'?state.bg:state.tool=='high'?'rgba(221,191,130,.35)':state.color;ctx.lineWidth=state.tool=='high'?state.size*2:state.size;if(['line','rect'].includes(state.tool)){ctx.putImageData(snap,0,0);ctx.beginPath();if(state.tool=='line'){ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y)}else ctx.rect(last.x,last.y,q.x-last.x,q.y-last.y);ctx.stroke();return}ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q}function stop(){if(drawing){drawing=false;capture()}}['mousedown','touchstart'].forEach(e=>c.addEventListener(e,start,{passive:false}));['mousemove','touchmove'].forEach(e=>c.addEventListener(e,move,{passive:false}));['mouseup','mouseleave','touchend'].forEach(e=>c.addEventListener(e,stop))}
function downloadBoard(){capture();let c=$('#cv'),a=document.createElement('a');a.download='job-dues-tabula.png';a.href=c.toDataURL();a.click()}function saveProject(){capture();let a=document.createElement('a');a.download='job-dues-projekt.json';a.href=URL.createObjectURL(new Blob([JSON.stringify({state,objects,boardData},null,2)],{type:'application/json'}));a.click()}function loadProject(file){let r=new FileReader();r.onload=()=>{let p=JSON.parse(r.result);state=p.state||state;objects=p.objects||[];boardData=p.boardData||'';persist();board()};r.readAsText(file)}
function ann(){shell(`<section class="two grid"><div class="panel"><h2>Nový oznam</h2><input id="at" class="field" placeholder="Nadpis"><textarea id="ab" class="field" placeholder="Text"></textarea><button class="action" onclick="items.ann.unshift({t:at.value,b:ab.value});store('ann',items.ann);ann()">Pridať</button></div><div class="grid">${items.ann.map(i=>`<article class="list"><h2>${esc(i.t)}</h2><p>${esc(i.b)}</p></article>`).join('')}</div></section>`)}
function tasks(){let sts=['nové','rieši sa','hotové'];shell(`<section class="two grid"><div class="panel"><h2>Nová úloha</h2><input id="nt" class="field"><button class="action" onclick="items.tasks.unshift({t:nt.value,s:'nové'});store('tasks',items.tasks);tasks()">Pridať</button></div><div class="grid metrics">${sts.map(s=>`<div class="panel"><h2>${s}</h2>${items.tasks.filter(x=>x.s==s).map(x=>`<div class="list"><p>${esc(x.t)}</p>${sts.map(n=>`<button class="pill ${x.s==n?'active':''}" onclick="items.tasks[${items.tasks.indexOf(x)}].s='${n}';store('tasks',items.tasks);tasks()">${n}</button>`).join('')}</div>`).join('')}</div>`).join('')}</div></section>`)}
function clients(){shell(`<section class="grid metrics">${items.clients.map((x,i)=>`<div class="panel"><h2>${esc(x.n)}</h2><h3>Chýbajúce doklady</h3><textarea class="field" onchange="items.clients[${i}].m=this.value;store('clients',items.clients)">${esc(x.m)}</textarea><h3>Poznámky</h3><textarea class="field" onchange="items.clients[${i}].p=this.value;store('clients',items.clients)">${esc(x.p)}</textarea></div>`).join('')}</section>`)}
function docs(){shell(`<section class="grid home">${['Zmluvy','Faktúry','DPH reporty','Mzdové podklady','Interné smernice','Archív klientov'].map(x=>`<div class="card"><b>□</b><h2>${x}</h2><p>Priestor pripravený na napojenie firemného úložiska.</p></div>`).join('')}</section>`)}
function ai(){shell(`<section class="panel"><h2>AI asistent</h2><div class="grid">${items.chat.map(m=>`<div class="chat ${m.r}">${esc(m.t)}</div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 150px;margin-top:14px"><input id="q" class="field" placeholder="Napíšte otázku"><button class="action" onclick="items.chat.push({r:'user',t:q.value},{r:'ai',t:'Demo odpoveď: API sa dá napojiť neskôr. AI obrázok je v digitálnej tabuli.'});store('chat',items.chat);ai()">Odoslať</button></div></section>`)}
function analytics(){let m=[['Tržby','128 400 €'],['Náklady','74 900 €'],['Zisk','53 500 €'],['DPH','16 240 €'],['Pohľadávky','31 800 €'],['Záväzky','22 600 €']];shell(`<section class="grid metrics">${m.map(x=>`<div class="panel metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</section>`)}
function render(){({home,board,ann,tasks,clients,docs,ai,analytics}[state.view]||home)()}render();
</script></body></html>
